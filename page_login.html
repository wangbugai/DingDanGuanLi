    <script>
        // 检测是否为手机设备
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // 页面加载时执行跳转逻辑
        window.onload = function () {
            if (isMobileDevice()) {
                // 如果是手机设备，跳转到移动端登录页面
                window.location.href = "/mobi/login";
            } else {
                // 如果是桌面设备，跳转到桌面版登录页面

            }
        };
    </script>
