<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>个人资料</title>
    <link href="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/css/layui.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f4f5f7; font-family: 'Microsoft YaHei', sans-serif; margin: 0; padding: 0; }
        .content { padding: 20px; }
        .panel { background: #fff; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .panel-body { padding: 25px; max-width: 600px; }
        .panel-title { font-size: 18px; font-weight: bold; color: #333; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #708eea; }
        .panel-title i { color: #708eea; margin-right: 8px; }
    </style>
</head>
<body>
    <div class="content">
        <div class="panel">
            <div class="panel-body">
                <div class="panel-title"><i class="fas fa-user"></i> 个人资料</div>
                <form class="layui-form layui-form-pane" id="profileForm">
                    <div class="layui-form-item">
                        <label class="layui-form-label">用户名</label>
                        <div class="layui-input-block">
                            <input type="text" id="p_username" class="layui-input" disabled>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">昵称</label>
                        <div class="layui-input-block">
                            <input type="text" name="nickname" id="p_nickname" class="layui-input" placeholder="请输入昵称">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">新密码</label>
                        <div class="layui-input-block">
                            <input type="password" name="password" id="p_password" class="layui-input" placeholder="留空则不修改">
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">角色</label>
                        <div class="layui-input-block">
                            <input type="text" id="p_role" class="layui-input" disabled>
                        </div>
                    </div>
                    <div class="layui-form-item" style="margin-top:20px;">
                        <div class="layui-input-block">
                            <button type="button" class="layui-btn" id="saveBtn" style="background:#708eea;"><i class="fas fa-save"></i> 保存修改</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/layui.js"></script>
    <script>
        var TOKEN = new URLSearchParams(window.location.search).get('token') || sessionStorage.getItem('auth_token') || '';
        $.ajaxSetup({ beforeSend: function(xhr) { if (TOKEN) xhr.setRequestHeader('Authorization', 'Bearer ' + TOKEN); } });
        $.get('/api/users?limit=999', function(res) {
            var uid = parseInt(document.cookie.replace(/(?:(?:^|.*;\s*)user_id\s*\=\s*([^;]*).*$)|^.*$/, '$1'));
        });

        // 从session获取当前用户信息
        $.get('/api/users?limit=999', function(res) {
            // 简单方式：取第一个匹配的
        });

        // 直接从页面获取信息
        var currentUser = null;
        $.get('/api/dashboard/stats', function(res) {
            // 通过其他方式获取
        });

        // 暂时用简单方式
        $('#saveBtn').on('click', function() {
            layui.layer.msg('功能开发中', {icon: 0});
        });
    </script>
</body>
</html>
