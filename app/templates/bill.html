<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>收益管理</title>
    <link href="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/css/layui.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f4f5f7; font-family: 'Microsoft YaHei', sans-serif; margin: 0; padding: 0; }
        .content { padding: 15px; }
        .panel { background: #fff; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .panel-body { padding: 15px; }
        .stat-row { display: flex; gap: 12px; margin-bottom: 15px; flex-wrap: wrap; }
        .stat-box { flex: 1; min-width: 150px; padding: 12px 15px; border-radius: 6px; color: #fff; position: relative; overflow: hidden; }
        .stat-box .stat-val { font-size: 24px; font-weight: bold; }
        .stat-box .stat-lbl { font-size: 12px; opacity: 0.85; margin-top: 4px; }
        .stat-box .stat-icon { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 36px; opacity: 0.2; }
        .stat-box.blue { background: linear-gradient(135deg, #708eea, #5a7de6); }
        .stat-box.green { background: linear-gradient(135deg, #5FB878, #4aa363); }
        .stat-box.orange { background: linear-gradient(135deg, #ffb800, #e6a600); }
        .stat-box.red { background: linear-gradient(135deg, #ff5722, #e64a19); }
        #searchBtn { background-color: #807dba; }
        .layui-table-cell { padding: 6px !important; font-size: 13px; }
        .layui-btn-xs { height: 24px; line-height: 24px; padding: 0 8px; font-size: 12px; }
        .status-unpaid { color: #ff5722; font-weight: bold; }
        .status-settling { color: #ffb800; font-weight: bold; }
        .status-settled { color: #5FB878; font-weight: bold; }
        .type-player { background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .type-service { background: #e3f2fd; color: #1565c0; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .layui-form-pane .layui-form-label { width: 80px !important; font-size: 12px !important; }
        .amount-highlight { color: #ff5722; font-weight: bold; }
        .profit-positive { color: #5FB878; font-weight: bold; }
        .profit-negative { color: #ff5722; font-weight: bold; }
        .order-state { padding: 2px 6px; border-radius: 3px; font-size: 12px; display: inline-block; color: #fff; }
        .order-state-0 { background: #ff9800; } .order-state-1 { background: #2196f3; }
        .order-state-2 { background: #9c27b0; } .order-state-3 { background: #00bcd4; }
        .order-state-4 { background: #4caf50; } .order-state-5 { background: #ff5722; }
        .order-state-6 { background: #607d8b; } .order-state-10 { background: #795548; }
        .order-state-11 { background: #f44336; } .order-state-12 { background: #e91e63; }
        .order-state-13 { background: #9e9e9e; }
        .img-count { color: #1e9fff; cursor: pointer; } .img-count:hover { text-decoration: underline; }
        .img-thumb { width: 100px; height: 100px; object-fit: cover; margin: 5px; border-radius: 4px; border: 1px solid #e2e2e2; cursor: pointer; }
        .img-wrap { display: inline-block; position: relative; margin: 5px; }
        .img-del { position: absolute; top: 2px; right: 2px; background: rgba(255,0,0,0.7); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; line-height: 20px; text-align: center; cursor: pointer; font-size: 12px; }
        .drop-zone { border: 2px dashed #c5b3e6; border-radius: 8px; padding: 20px; text-align: center; color: #999; margin-top: 10px; transition: all .2s; cursor: pointer; }
        .drop-zone:hover, .drop-zone.drag-over { border-color: #807dba; background: #f5f0fa; color: #807dba; }
        .drop-zone i { font-size: 32px; display: block; margin-bottom: 6px; }
    </style>
</head>
<body>
    <div class="content">
        <div class="stat-row" id="statRow">
            <div class="stat-box blue">
                <div class="stat-val" id="statTotal">0</div>
                <div class="stat-lbl">总收益金额</div>
                <i class="fas fa-yen-sign stat-icon"></i>
            </div>
            <div class="stat-box green">
                <div class="stat-val" id="statSettled">0</div>
                <div class="stat-lbl">已结算金额</div>
                <i class="fas fa-check-circle stat-icon"></i>
            </div>
            <div class="stat-box orange">
                <div class="stat-val" id="statUnpaid">0</div>
                <div class="stat-lbl">待结算金额</div>
                <i class="fas fa-clock stat-icon"></i>
            </div>
            <div class="stat-box red">
                <div class="stat-val" id="statCount">0</div>
                <div class="stat-lbl">收益笔数</div>
                <i class="fas fa-list-ol stat-icon"></i>
            </div>
        </div>

        <div class="panel">
            <div class="panel-body">
                <form class="layui-form layui-form-pane" action="" style="margin-bottom: 10px;">
                    <div class="layui-form-item">
                        <div class="layui-inline">
                            <label class="layui-form-label">收益类型</label>
                            <div class="layui-input-inline">
                                <select name="bill_type" id="bill_type">
                                    <option value="">全部</option>
                                    <option value="player">打手报酬</option>
                                    <option value="service">客服报酬</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">结算状态</label>
                            <div class="layui-input-inline">
                                <select name="state" id="state">
                                    <option value="">全部</option>
                                    <option value="unpaid">未结算</option>
                                    <option value="settling">结算中</option>
                                    <option value="settled">已结算</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">关键词</label>
                            <div class="layui-input-inline">
                                <input type="text" id="keyword" placeholder="订单号/标题/角色/游戏" class="layui-input" style="width:180px;height:32px;">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">订单状态</label>
                            <div class="layui-input-inline">
                                <select name="order_state" id="order_state">
                                    <option value="">全部</option>
                                    <option value="3">待上号</option>
                                    <option value="4">代练中</option>
                                    <option value="5">待验收</option>
                                    <option value="6">已完成</option>
                                    <option value="12">问题单</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">游戏</label>
                            <div class="layui-input-inline">
                                <select name="game_id" id="game_id" lay-search><option value="">全部</option></select>
                            </div>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <div class="layui-inline">
                            <label class="layui-form-label">来源</label>
                            <div class="layui-input-inline">
                                <select name="source_id" id="source_id" lay-search><option value="">全部</option></select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">接手人</label>
                            <div class="layui-input-inline">
                                <select name="receiver_id" id="receiver_id" lay-search><option value="">全部</option></select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">录单人</label>
                            <div class="layui-input-inline">
                                <select name="creator_id" id="creator_id" lay-search><option value="">全部</option></select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">收款</label>
                            <div class="layui-input-inline">
                                <select name="pay_status" id="pay_status">
                                    <option value="">全部</option>
                                    <option value="unpaid">未收款</option>
                                    <option value="paid">已收款</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">日期</label>
                            <div class="layui-input-inline" style="width:120px;">
                                <input type="text" id="date_from" placeholder="开始日期" class="layui-input" readonly>
                            </div>
                            <div class="layui-input-inline" style="width:120px;">
                                <input type="text" id="date_to" placeholder="结束日期" class="layui-input" readonly>
                            </div>
                        </div>
                    </div>
                    <button type="button" class="layui-btn" id="searchBtn"><i class="fas fa-search"></i> 搜索</button>
                    <button type="button" class="layui-btn layui-btn-primary" id="refreshBtn"><i class="fas fa-refresh"></i> 刷新</button>
                </form>
                <table class="layui-table" id="listTable" lay-filter="listTable"></table>
            </div>
        </div>
    </div>

    {% raw %}
    <script type="text/html" id="typeTpl">
        {{#  if(d.bill_type === 'player'){ }}
            <span class="type-player"><i class="fas fa-gamepad"></i> 打手报酬</span>
        {{#  } else { }}
            <span class="type-service"><i class="fas fa-headset"></i> 客服报酬</span>
        {{#  } }}
    </script>
    <script type="text/html" id="stateTpl">
        {{#  if(d.state === 'unpaid'){ }}
            <span class="status-unpaid"><i class="fas fa-circle" style="font-size:8px;"></i> 未结算</span>
        {{#  } else if(d.state === 'settling'){ }}
            <span class="status-settling"><i class="fas fa-circle" style="font-size:8px;"></i> 结算中</span>
        {{#  } else { }}
            <span class="status-settled"><i class="fas fa-check-circle"></i> 已结算</span>
        {{#  } }}

        {{#  } else { }}
            <span>¥0.00</span>
        {{#  } }}
    </script>
    <script type="text/html" id="profitTpl">
        {{#  var profit = (d.order_amount || 0) - (d.order_cost || 0); }}
        {{#  if(profit >= 0){ }}
            <span class="profit-positive">+¥{{ profit.toFixed(2) }}</span>
        {{#  } else { }}
            <span class="profit-negative">-¥{{ Math.abs(profit).toFixed(2) }}</span>
        {{#  } }}
    </script>
    <script type="text/html" id="orderStateTpl">
        {{# if(d.order_state !== '' && d.order_state !== undefined){ }}
            <span class="order-state order-state-{{ d.order_state }}">{{ d.order_state_name }}</span>

        {{# } }}
    </script>
    <script type="text/html" id="imgTpl">
        {{# var cnt = d.image_count || 0; }}
        {{# if(cnt > 0){ }}<span class="img-count" lay-event="viewImg">{{ cnt }}张</span>{{# } else { }}<span style="color:#ccc">0张</span>{{# } }}
        <i class="layui-icon layui-icon-upload" style="font-size:16px;color:#807dba;cursor:pointer;margin-left:3px;" lay-event="uploadImg" title="上传/管理截图"></i>
    </script>
    <script type="text/html" id="toolDemo">
        <div class="layui-clear-space">
            {{# if(d.state !== 'settled'){ }}
            <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="settle"><i class="fas fa-check"></i> 结算</a>
            {{# } }}
        </div>
    </script>
    {% endraw %}

    <div id="imgModal" style="display:none; padding: 15px;">
        <div id="imgList" style="max-height: 300px; overflow-y: auto; margin-bottom: 10px;"></div>
        <div class="drop-zone" id="dropZone">
            <i class="layui-icon layui-icon-upload"></i>
            拖拽图片到此处上传，或点击选择文件
        </div>
        <input type="file" id="imgFileInput" multiple accept="image/*" style="display:none;">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/layui.js"></script>
    <script>
        var TOKEN = new URLSearchParams(window.location.search).get('token') || sessionStorage.getItem('auth_token') || '';
        $.ajaxSetup({ beforeSend: function(xhr) { if (TOKEN) xhr.setRequestHeader('Authorization', 'Bearer ' + TOKEN); } });
        $(document).ajaxError(function(event, xhr) {
            if (xhr.status === 401) { sessionStorage.removeItem('auth_token'); window.top.location.href = '/login'; }
            else if (xhr.status === 403) { layui.layer.alert('权限不足，请重新登录', {icon:2}, function(){ window.top.location.href = '/login'; }); }
        });
        layui.use(['table', 'layer', 'form', 'laydate'], function() {
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;
            var laydate = layui.laydate;

            var isDashi = false;
            $.ajax({ url: '/api/current_user?token=' + TOKEN, async: false, success: function(res) { if (res.code === 1 && res.data) isDashi = (res.data.role_level || 99) >= 4; } });

            function tk(url) { return url + (url.indexOf('?') > -1 ? '&' : '?') + 'token=' + TOKEN; }
            laydate.render({ elem: '#date_from', format: 'yyyy-MM-dd' });
            laydate.render({ elem: '#date_to', format: 'yyyy-MM-dd' });

            function billWhere() {
                return {
                    bill_type: $('#bill_type').val(),
                    state: $('#state').val(),
                    keyword: $('#keyword').val(),
                    order_state: $('#order_state').val(),
                    game_id: $('#game_id').val(),
                    source_id: $('#source_id').val(),
                    receiver_id: $('#receiver_id').val(),
                    creator_id: $('#creator_id').val(),
                    pay_status: $('#pay_status').val(),
                    date_from: $('#date_from').val(),
                    date_to: $('#date_to').val()
                };
            }

            function applyStats(res) {
                var stats = res.stats || {};
                $('#statTotal').text('¥' + Number(stats.total_amount || 0).toFixed(2));
                $('#statSettled').text('¥' + Number(stats.settled_amount || 0).toFixed(2));
                $('#statUnpaid').text('¥' + Number(stats.unsettled_amount || 0).toFixed(2));
                $('#statCount').text(res.count || 0);
            }

            function loadStats() {
                $.get(tk('/api/bills?limit=1'), billWhere(), applyStats);
            }
            loadStats();

            $.get(tk('/api/games'), function(res) {
                var html = '<option value="">全部</option>';
                (res.data || []).forEach(function(g) { html += '<option value="'+g.id+'">'+g.name+'</option>'; });
                $('#game_id').html(html);
                form.render('select');
            });
            $.get(tk('/api/sources'), function(res) {
                var html = '<option value="">全部</option>';
                (res.data || []).forEach(function(s) { html += '<option value="'+s.id+'">'+s.name+'</option>'; });
                $('#source_id').html(html);
                form.render('select');
            });
            $.get(tk('/api/users?limit=999'), function(res) {
                var html = '<option value="">全部</option>';
                (res.data || []).forEach(function(u) { html += '<option value="'+u.id+'">'+(u.nickname || u.username)+'</option>'; });
                $('#receiver_id').html(html);
                $('#creator_id').html(html);
                form.render('select');
            });

            var billCols = [
                { field: 'id', title: 'ID', width: 50, sort: true },
                { field: 'order_no', title: '订单号', width: 170 },
                { field: 'game_name', title: '游戏', width: 80 },
                { field: 'title', title: '订单标题', width: 120 },
                { field: 'order_type_name', title: '订单类型', width: 80 },
                { field: 'character_name', title: '角色名', width: 80 },
                { field: 'order_state', title: '订单状态', width: 85, templet: '#orderStateTpl' }
            ];
            if (!isDashi) {
                billCols.push({ field: 'source_name', title: '来源', width: 70 });
                billCols.push({ field: 'order_amount', title: '订单金额', width: 85, templet: function(d) { return '¥' + (d.order_amount||0).toFixed(2); } });
                billCols.push({ field: 'order_cost', title: '订单成本', width: 85, templet: function(d) { return '¥' + (d.order_cost||0).toFixed(2); } });
                billCols.push({ title: '订单利润', width: 85, templet: '#profitTpl' });
            }
            billCols.push({ field: 'bill_type', title: '收益类型', width: 95, templet: '#typeTpl' });
            billCols.push({ field: 'username', title: '收益人', width: 80 });
            billCols.push({ field: 'amount', title: '收益金额', width: 85, templet: '#amountTpl' });
            billCols.push({ field: 'state', title: '结算状态', width: 85, templet: '#stateTpl' });
            billCols.push({ field: 'image_count', title: '截图', width: 85, templet: '#imgTpl', align: 'center' });
            if (!isDashi) {
                billCols.push({ field: 'creator_name', title: '录单人', width: 70 });
            }
            billCols.push({ field: 'receiver_name', title: '接手人', width: 70 });
            billCols.push({ field: 'created_at', title: '创建时间', width: 145 });
            billCols.push({ field: 'settled_at', title: '结算时间', width: 145 });
            billCols.push({ title: '操作', toolbar: '#toolDemo', width: 80, align: 'center', fixed: 'right' });

            table.render({
                elem: '#listTable',
                url: '/api/bills?token=' + TOKEN,
                page: true,
                limit: 15,
                cols: [billCols],
                parseData: function(res) {
                    applyStats(res);
                    return { "code": res.code, "msg": "", "count": res.count, "data": res.data };
                }
            });

            $('#searchBtn').on('click', function() {
                table.reload('listTable', { where: billWhere(), page: { curr: 1 } });
                loadStats();
            });
            $('#refreshBtn').on('click', function() { table.reload('listTable'); loadStats(); });

            table.on('tool(listTable)', function(obj) {
                if (obj.event === 'settle') {
                    layer.confirm('确定结算该收益？结算后不可撤销', function(idx) {
                        $.ajax({
                            url: '/api/bills/' + obj.data.id + '/settle?token=' + TOKEN, method: 'POST',
                            success: function(res) {
                                if (res.code === 1) { table.reload('listTable'); loadStats(); layer.msg(res.msg, {icon:1}); }
                                else { layer.msg(res.msg, {icon:2}); }
                                layer.close(idx);
                            }
                        });
                    });
                } else if (obj.event === 'viewImg' || obj.event === 'uploadImg') {
                    var oid = obj.data.order_id;
                    if (!oid) { layer.msg('无关联订单', {icon:0}); return; }
                    loadBillImages(oid);
                    layer.open({
                        type: 1, title: (obj.data.order_no || '') + '的截图', area: ['600px', '480px'],
                        content: $('#imgModal')
                    });
                }
            });

            var currentBillImgOid = null;
            function loadBillImages(oid) {
                currentBillImgOid = oid;
                $.get('/api/orders/' + oid + '/images?token=' + TOKEN, function(res) {
                    var html = '';
                    (res.data || []).forEach(function(img) {
                        html += '<div class="img-wrap"><img class="img-thumb" src="' + img.url + '" onclick="layui.layer.photos({photos:{data:[{alt:\'\',src:\'' + img.url + '\'}]}})"><button class="img-del" data-iid="' + img.id + '" data-oid="' + oid + '">&times;</button></div>';
                    });
                    if (!html) html = '<div style="color:#999;text-align:center;padding:20px;">暂无图片</div>';
                    $('#imgList').html(html);
                });
            }

            $(document).on('click', '#imgModal .img-del', function() {
                var iid = $(this).data('iid');
                var oid = $(this).data('oid');
                layer.confirm('确定删除该图片？', {icon:3}, function(idx) {
                    $.ajax({
                        url: '/api/order_images/' + iid + '?token=' + TOKEN, method: 'DELETE',
                        success: function(res) {
                            if (res.code === 1) { loadBillImages(oid); table.reload('listTable'); loadStats(); layer.close(idx); layer.msg('已删除', {icon:1}); }
                            else { layer.msg(res.msg || '删除失败', {icon:2}); }
                        }
                    });
                });
            });

            function uploadBillImgFiles(files) {
                if (!currentBillImgOid || !files.length) return;
                var fd = new FormData();
                for (var i = 0; i < files.length; i++) {
                    if (files[i].type.startsWith('image/')) fd.append('file', files[i]);
                }
                if (!fd.has('file')) { layer.msg('请选择图片文件', {icon:0}); return; }
                $.ajax({
                    url: '/api/orders/' + currentBillImgOid + '/images?token=' + TOKEN, method: 'POST',
                    data: fd, processData: false, contentType: false,
                    success: function(res) {
                        if (res.code === 1) { loadBillImages(currentBillImgOid); table.reload('listTable'); layer.msg('上传成功', {icon:1}); }
                        else { layer.msg(res.msg || '上传失败', {icon:2}); }
                    }
                });
            }

            $('#dropZone').on('click', function() { $('#imgFileInput').click(); });
            $('#dropZone').on('dragover', function(e) { e.preventDefault(); e.stopPropagation(); $(this).addClass('drag-over'); });
            $('#dropZone').on('dragleave drop', function(e) { e.preventDefault(); e.stopPropagation(); $(this).removeClass('drag-over'); });
            $('#dropZone').on('drop', function(e) { uploadBillImgFiles(e.originalEvent.dataTransfer.files); });
            $('#imgFileInput').on('change', function() { uploadBillImgFiles(this.files); this.value = ''; });
        });
    </script>
</body>
</html>
