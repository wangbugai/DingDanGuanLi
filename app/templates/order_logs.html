<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>订单日志</title>
    <link href="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/css/layui.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f4f5f7; font-family: 'Microsoft YaHei', sans-serif; margin: 0; padding: 0; }
        .content { padding: 15px; }
        .panel { background: #fff; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .panel-body { padding: 15px; }
        #searchBtn { background: linear-gradient(135deg, #ff9800, #ffb800); border: none; }
        .layui-table-cell { padding: 8px 6px !important; font-size: 13px; }
        .log-action { padding: 2px 8px; border-radius: 3px; font-size: 12px; display: inline-block; }
        .log-create { background: #e8f5e9; color: #2e7d32; }
        .log-assign { background: #e3f2fd; color: #1565c0; }
        .log-status { background: #fff3e0; color: #e65100; }
        .log-price { background: #f3e5f5; color: #7b1fa2; }
        .log-delete { background: #ffebee; color: #c62828; }
        .log-other { background: #f5f5f5; color: #616161; }
        .order-no-link { color: #1e9fff; cursor: pointer; }
        .order-no-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="content">
        <div class="panel">
            <div class="panel-body">
                <form class="layui-form layui-form-pane" action="" style="margin-bottom: 10px;">
                    <div class="layui-form-item">
                        <div class="layui-inline">
                            <label class="layui-form-label">时间范围</label>
                            <div class="layui-input-inline" style="width:140px;">
                                <input type="text" id="startDate" class="layui-input" placeholder="开始日期" readonly>
                            </div>
                            <div class="layui-input-inline" style="width:30px; text-align:center; line-height:32px;">至</div>
                            <div class="layui-input-inline" style="width:140px;">
                                <input type="text" id="endDate" class="layui-input" placeholder="结束日期" readonly>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">操作人</label>
                            <div class="layui-input-inline" style="width:120px;">
                                <input type="text" name="operator" id="s_operator" placeholder="操作人" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">订单号</label>
                            <div class="layui-input-inline" style="width:160px;">
                                <input type="text" name="order_no" id="s_order_no" placeholder="订单号" class="layui-input">
                            </div>
                        </div>
                    </div>
                    <button type="button" class="layui-btn" id="searchBtn"><i class="fas fa-search"></i> 搜索</button>
                    <button type="button" class="layui-btn layui-btn-primary" id="refreshBtn"><i class="fas fa-refresh"></i> 刷新</button>
                </form>

                <table class="layui-table" id="listTable" lay-filter="listTable"></table>
            </div>
        </div>
    </div>

    {% raw %}
    <script type="text/html" id="actionTpl">
        {{# var cls = 'log-other'; }}
        {{# if(d.content && d.content.indexOf('创建') > -1){ cls = 'log-create'; }}
        {{# } else if(d.content && d.content.indexOf('指派') > -1){ cls = 'log-assign'; }}
        {{# } else if(d.content && d.content.indexOf('状态') > -1 || d.content.indexOf('暂停') > -1 || d.content.indexOf('恢复') > -1){ cls = 'log-status'; }}
        {{# } else if(d.content && d.content.indexOf('价格') > -1 || d.content.indexOf('改价') > -1){ cls = 'log-price'; }}
        {{# } else if(d.content && d.content.indexOf('删除') > -1){ cls = 'log-delete'; }}
        <span class="log-action {{ cls }}">{{ d.content }}</span>
    </script>
    <script type="text/html" id="orderNoTpl">
        <span class="order-no-link">{{ d.order_no || '-' }}</span>
    </script>
    {% endraw %}

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/layui.js"></script>
    <script>
        var TOKEN = new URLSearchParams(window.location.search).get('token') || sessionStorage.getItem('auth_token') || '';
        $.ajaxSetup({ beforeSend: function(xhr) { if (TOKEN) xhr.setRequestHeader('Authorization', 'Bearer ' + TOKEN); } });
        $(document).ajaxError(function(event, xhr) {
            if (xhr.status === 401) { sessionStorage.removeItem('auth_token'); window.top.location.href = '/login'; }
        });
        function tk(url) { return url + (url.indexOf('?') > -1 ? '&' : '?') + 'token=' + TOKEN; }

        layui.use(['table', 'layer', 'form', 'laydate'], function() {
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;
            var laydate = layui.laydate;

            laydate.render({ elem: '#startDate', format: 'yyyy-MM-dd' });
            laydate.render({ elem: '#endDate', format: 'yyyy-MM-dd' });

            table.render({
                elem: '#listTable',
                url: tk('/api/order_logs'),
                page: true,
                limit: 15,
                cols: [[
                    { field: 'id', title: 'ID', width: 60, sort: true },
                    { field: 'created_at', title: '时间', width: 170 },
                    { field: 'username', title: '操作人', width: 110 },
                    { title: '订单号', width: 180, templet: '#orderNoTpl' },
                    { title: '操作内容', minWidth: 200, templet: '#actionTpl' }
                ]],
                parseData: function(res) {
                    return { "code": res.code, "msg": "", "count": res.count, "data": res.data };
                }
            });

            function loadData() {
                var order_no = $('#s_order_no').val();
                var operator = $('#s_operator').val();
                var where = {};
                if (order_no) where.order_no = order_no;
                if (operator) where.keyword = operator;
                table.reload('listTable', { where: where });
            }

            $('#searchBtn').on('click', function() { loadData(); });
            $('#refreshBtn').on('click', function() { loadData(); });
        });
    </script>
</body>
</html>
