<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>来源管理</title>
    <link href="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/css/layui.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f4f5f7; font-family: 'Microsoft YaHei', sans-serif; margin: 0; padding: 0; }
        .content { padding: 15px; }
        .panel { background: #fff; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .panel-body { padding: 15px; }
        .toolbar { margin-bottom: 15px; display: flex; gap: 8px; }
        .layui-table-cell { padding: 8px 6px !important; }
        .layui-btn-xs { height: 24px; line-height: 24px; padding: 0 8px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="content">
        <div class="panel">
            <div class="panel-body">
                <div class="toolbar">
                    <a href="javascript:;" class="layui-btn layui-btn-primary" id="refreshBtn"><i class="fas fa-refresh"></i> 刷新</a>
                    <a href="javascript:;" class="layui-btn layui-btn-normal" id="addNew"><i class="fas fa-plus"></i> 新增来源</a>
                </div>
                <table class="layui-table" id="listTable" lay-filter="listTable"></table>
            </div>
        </div>
    </div>

    <script type="text/html" id="toolDemo">
        <div class="layui-clear-space">
            <a class="layui-btn layui-btn-xs layui-btn-warning" lay-event="edit">修改</a>
            <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
        </div>
    </script>

    <div id="sourceModal" style="display:none; padding: 20px;">
        <form class="layui-form layui-form-pane" id="sourceForm">
            <input type="hidden" name="id" id="editId">
            <div class="layui-form-item">
                <label class="layui-form-label">来源名称</label>
                <div class="layui-input-block">
                    <input type="text" name="name" id="name" autocomplete="off" placeholder="请输入" lay-verify="required" class="layui-input">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">来源描述</label>
                <div class="layui-input-block">
                    <input type="text" name="desc" id="desc" autocomplete="off" placeholder="请输入" class="layui-input">
                </div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/layui.js"></script>
    <script>
        var TOKEN = new URLSearchParams(window.location.search).get('token') || sessionStorage.getItem('auth_token') || '';
        $.ajaxSetup({ beforeSend: function(xhr) { if (TOKEN) xhr.setRequestHeader('Authorization', 'Bearer ' + TOKEN); } });
        $(document).ajaxError(function(event, xhr) {
            if (xhr.status === 401) { sessionStorage.removeItem('auth_token'); window.top.location.href = '/login'; }
            else if (xhr.status === 403) { layui.layer.alert('权限不足，可能存在账号冲突，请重新登录', {icon:2}, function(){ window.top.location.href = '/login'; }); }
        });
        layui.use(['table', 'layer', 'form'], function() {
            var table = layui.table;
            var layer = layui.layer;

            table.render({
                elem: '#listTable',
                url: '/api/sources?token=' + TOKEN,
                page: true,
                limit: 15,
                cols: [[
                    { field: 'id', title: 'ID', width: 80, sort: true },
                    { field: 'name', title: '来源名称', width: 200 },
                    { field: 'desc', title: '来源描述', width: 250 },
                    { field: 'created_at', title: '创建时间', width: 180 },
                    { title: '操作', toolbar: '#toolDemo', width: 150, align: 'center' }
                ]],
                parseData: function(res) {
                    return { "code": res.code, "msg": "", "count": res.count, "data": res.data };
                }
            });

            $('#refreshBtn').on('click', function() { table.reload('listTable'); });

            $('#addNew').on('click', function() {
                $('#editId').val('');
                $('#sourceForm')[0].reset();
                showSourceModal();
            });

            function showSourceModal() {
                layer.open({
                    type: 1, title: '来源编辑', area: ['450px', '250px'],
                    content: $('#sourceModal'),
                    btn: ['确定', '取消'],
                    yes: function(index) {
                        var data = { name: $('#name').val(), desc: $('#desc').val() };
                        var editId = $('#editId').val();
                        var method = editId ? 'PUT' : 'POST';
                        var url = editId ? '/api/sources/' + editId + '?token=' + TOKEN : '/api/sources?token=' + TOKEN;
                        $.ajax({
                            url: url, method: method,
                            contentType: 'application/json',
                            data: JSON.stringify(data),
                            success: function(res) {
                                if (res.code === 1) { table.reload('listTable'); layer.close(index); layer.msg(res.msg, {icon:1}); }
                                else { layer.msg(res.msg, {icon:2}); }
                            }
                        });
                    }
                });
            }

            table.on('tool(listTable)', function(obj) {
                var data = obj.data;
                if (obj.event === 'edit') {
                    $('#editId').val(data.id);
                    $('#name').val(data.name);
                    $('#desc').val(data.desc);
                    showSourceModal();
                } else if (obj.event === 'del') {
                    layer.confirm('确定删除？', function(idx) {
                        $.ajax({ url: '/api/sources/' + data.id + '?token=' + TOKEN, method: 'DELETE',
                            success: function(res) {
                                if (res.code === 1) { table.reload('listTable'); layer.msg(res.msg, {icon:1}); }
                                else { layer.msg(res.msg, {icon:2}); }
                                layer.close(idx);
                            }
                        });
                    });
                }
            });
        });
    </script>
</body>
</html>
