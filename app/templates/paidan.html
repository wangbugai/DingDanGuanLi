<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>指派给我的订单</title>
    <link href="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/css/layui.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f4f5f7; font-family: 'Microsoft YaHei', sans-serif; margin: 0; padding: 0; }
        .content { padding: 15px; }
        .panel { background: #fff; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .panel-body { padding: 15px; }
        #searchBtn { background-color: #807dba; }
        .layui-table-cell { padding: 6px !important; }
        .layui-btn-xs { height: 24px; line-height: 24px; padding: 0 8px; font-size: 12px; }
        .state { padding: 3px 8px; border-radius: 3px; font-size: 12px; cursor: pointer; transition: opacity .2s; }
        .state:hover { opacity: 0.8; text-decoration: underline; }
        .state-readonly { cursor: default; }
        .state-readonly:hover { opacity: 1; text-decoration: none; }
        .state-0 { background: #ff9800; color: #fff; }
        .state-1 { background: #2196f3; color: #fff; }
        .state-2 { background: #9c27b0; color: #fff; }
        .state-3 { background: #00bcd4; color: #fff; }
        .state-4 { background: #4caf50; color: #fff; }
        .state-5 { background: #ff5722; color: #fff; }
        .state-6 { background: #607d8b; color: #fff; }
        .state-10 { background: #795548; color: #fff; }
        .state-11 { background: #f44336; color: #fff; }
        .state-12 { background: #e91e63; color: #fff; }
        .state-13 { background: #9e9e9e; color: #fff; }
        .priority-badge { background: #ff5722; color: #fff; padding: 1px 6px; border-radius: 3px; font-size: 11px; }
        .w-300 { width: 300px !important; }
        .w-150 { width: 150px !important; }
        .op-icon { font-size: 18px; cursor: pointer; margin: 0 3px; display: inline-block; transition: opacity .2s; }
        .op-icon:hover { opacity: 0.7; }
        .op-log { color: #ff9800; }
        .img-count { color: #1e9fff; cursor: pointer; } .img-count:hover { text-decoration: underline; }
        .log-item { padding: 8px 0; border-bottom: 1px dashed #e2e2e2; font-size: 13px; }
        .log-item:last-child { border-bottom: none; }
        .log-time { color: #999; margin-right: 8px; }
        .log-user { color: #1e9fff; margin-right: 8px; }
        .img-thumb { width: 100px; height: 100px; object-fit: cover; margin: 5px; border-radius: 4px; border: 1px solid #e2e2e2; cursor: pointer; }
        .img-wrap { display: inline-block; position: relative; margin: 5px; }
        .img-del { position: absolute; top: 2px; right: 2px; background: rgba(255,0,0,0.7); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; line-height: 20px; text-align: center; cursor: pointer; font-size: 12px; }
        .state-radio { cursor: pointer; display: inline-flex; align-items: center; gap: 4px; padding: 6px 10px; border: 2px solid transparent; border-radius: 6px; transition: all .2s; }
        .state-radio:hover { border-color: #807dba; background: #f9f7fc; }
        .state-radio.active { border-color: #807dba; background: #f0ecf7; box-shadow: 0 0 0 2px rgba(128,125,186,0.2); }
        .state-radio input[type="radio"] { display: none; }
        .drop-zone { border: 2px dashed #c5b3e6; border-radius: 8px; padding: 20px; text-align: center; color: #999; margin-top: 10px; transition: all .2s; cursor: pointer; }
        .drop-zone:hover, .drop-zone.drag-over { border-color: #807dba; background: #f5f0fa; color: #807dba; }
        .drop-zone i { font-size: 32px; display: block; margin-bottom: 6px; }
        .pay-no { color: #f44336; font-weight: bold; }
        .pay-yes { color: #4caf50; font-weight: bold; }
        .mobile-player-shell { display: none; }
        @media (max-width: 768px) {
            html, body { height: 100%; overflow: hidden; overscroll-behavior-y: none; }
            body { background: #f4f7fb; }
            .content { display: none; }
            .mobile-player-shell {
                display: flex; flex-direction: column; height: 100vh; height: 100dvh;
                min-height: 0; background: #f4f7fb; overflow: hidden;
            }
            .mobile-player-header {
                flex: 0 0 56px;
                height: 56px; background: linear-gradient(90deg, #347ff5, #2167e8); color: #fff;
                display: flex; align-items: center; justify-content: space-between; padding: 0 18px;
                box-shadow: 0 2px 8px rgba(31, 100, 220, .25); position: relative; z-index: 5;
            }
            .mobile-player-header .title { font-size: 18px; font-weight: 600; letter-spacing: 0; }
            .mobile-player-header button {
                width: 34px; height: 34px; border: none; background: transparent; color: #fff;
                display: inline-flex; align-items: center; justify-content: center; font-size: 20px;
            }
            .mobile-order-list {
                flex: 1 1 auto; min-height: 0; overflow-y: auto; overscroll-behavior-y: contain;
                -webkit-overflow-scrolling: touch; padding: 10px 12px calc(104px + env(safe-area-inset-bottom));
            }
            .mobile-order-card {
                background: #fff; border-radius: 8px; padding: 16px 16px 14px; margin-bottom: 12px;
                box-shadow: 0 2px 12px rgba(30, 45, 70, .08); border: 1px solid rgba(40, 85, 140, .06);
            }
            .mobile-card-top { display: flex; align-items: center; gap: 10px; min-width: 0; }
            .mobile-card-no {
                flex: 1; min-width: 0; color: #6b7280; font-size: 16px; font-weight: 600;
                overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            }
            .mobile-card-no i { color: #2f7df4; margin-right: 8px; }
            .mobile-card-pill {
                flex: 0 0 auto; border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 600;
                background: #edf5ff; color: #2d78db;
            }
            .mobile-card-state { background: #c9f8ee; color: #187b68; }
            .mobile-card-type { color: #6b7280; font-size: 13px; margin-top: 16px; }
            .mobile-card-title { color: #1f2937; font-size: 16px; line-height: 1.45; font-weight: 700; margin-top: 8px; padding-bottom: 14px; border-bottom: 1px solid #eef0f4; }
            .mobile-card-grid {
                display: grid; grid-template-columns: 1fr 1fr; gap: 18px 22px; padding: 14px 0 16px;
                border-bottom: 1px solid #eef0f4;
            }
            .mobile-card-label { color: #7a8494; font-size: 13px; margin-bottom: 8px; }
            .mobile-card-value { color: #111827; font-size: 15px; font-weight: 600; min-height: 20px; }
            .mobile-card-overdue { color: #f06423; }
            .mobile-card-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px; }
            .mobile-card-actions button {
                height: 42px; border: none; border-radius: 6px; background: #f2f4f8; color: #5f6775;
                font-size: 15px; font-weight: 600;
            }
            .mobile-card-actions .mobile-submit-review-btn { background: #9aa3b2; color: #fff; }
            .mobile-card-actions .mobile-submit-review-btn.is-active { background: #2f7df4; }
            .mobile-card-actions button:disabled { background: #9aa3b2; color: #fff; opacity: .9; }
            .mobile-empty { color: #8b94a3; text-align: center; padding: 42px 10px; }
        }
    </style>
</head>
<body>
    <div class="mobile-player-shell">
        <div class="mobile-player-header">
            <button type="button" id="mobileBackBtn"><i class="fas fa-chevron-left"></i></button>
            <div class="title">指派给我的订单</div>
            <button type="button" id="mobileRefreshBtn"><i class="fas fa-rotate-right"></i></button>
        </div>
        <div class="mobile-order-list" id="mobileOrderList">
            <div class="mobile-empty">加载中...</div>
        </div>
    </div>
    <div class="content">
        <div class="panel">
            <div class="panel-body">
                <form class="layui-form layui-form-pane" action="" style="margin-bottom: 10px;">
                    <div class="layui-form-item">
                        <div class="layui-inline">
                            <label class="layui-form-label">游戏筛选</label>
                            <div class="layui-input-inline" style="width:140px;">
                                <select name="game_id" id="game_id" lay-filter="game_id" lay-search>
                                    <option value="">全部游戏</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">大区</label>
                            <div class="layui-input-inline" style="width:130px;">
                                <select name="area_id" id="area_id" lay-filter="area_id" lay-search>
                                    <option value="">全部大区</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">服务器</label>
                            <div class="layui-input-inline" style="width:130px;">
                                <select name="server_id" id="server_id" lay-filter="server_id" lay-search>
                                    <option value="">全部服务器</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">订单状态</label>
                            <div class="layui-input-inline">
                                <select name="state" id="state" lay-filter="state">
                                    <option value="">请选择</option>
                                    <option value="0">待完善</option>
                                    <option value="1">待分配</option>
                                    <option value="2">待抢单</option>
                                    <option value="3">待上号</option>
                                    <option value="4">代练中</option>
                                    <option value="5">待验收</option>
                                    <option value="6">已完成</option>
                                    <option value="10">已暂停</option>
                                    <option value="11">异常中</option>
                                    <option value="12">问题单</option>
                                    <option value="13">已退单</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">订单类型</label>
                            <div class="layui-input-inline">
                                <select name="order_type" id="order_type" lay-filter="order_type">
                                    <option value="">全部</option>
                                    <option value="0">代练订单</option>
                                    <option value="1">陪玩订单</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">单号</label>
                            <div class="layui-input-inline w-150">
                                <input type="text" name="keyword" id="keyword" placeholder="请输入" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">收款状态</label>
                            <div class="layui-input-inline" style="width:100px;">
                                <select name="pay_status" id="pay_status">
                                    <option value="">全部</option>
                                    <option value="0">未收款</option>
                                    <option value="1">已收款</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <label class="layui-form-label">是否加急</label>
                            <div class="layui-input-inline" style="width:100px;">
                                <select name="is_urgent" id="is_urgent">
                                    <option value="">全部</option>
                                    <option value="1">是</option>
                                    <option value="0">否</option>
                                </select>
                            </div>
                        </div>
                        <div class="layui-inline">
                            <input type="checkbox" name="is_priority" id="is_priority" title="加急单" lay-skin="primary">
                        </div>
                    </div>
                    <div class="layui-inline">
                        <button type="button" class="layui-btn" id="searchBtn"><i class="fas fa-search"></i> 搜索</button>
                        <button type="button" class="layui-btn layui-btn-primary" id="refreshBtn"><i class="fas fa-refresh"></i> 刷新</button>
                    </div>
                </form>
                <table class="layui-table" id="listTable" lay-filter="listTable"></table>
            </div>
        </div>
    </div>

    {% raw %}
    <script type="text/html" id="stateTpl">
        {{# if(d.state === 6){ }}
        <span class="state state-readonly state-{{ d.state }}">{{ d.state_name }}</span>
        {{# } else { }}
        <span class="state state-{{ d.state }}" lay-event="editState">{{ d.state_name }}</span>
        {{# } }}
    </script>
    <script type="text/html" id="priorityTpl">
        {{#  if(d.is_priority){ }}
            <span class="priority-badge">加急</span>
        {{#  } }}
    </script>
    <script type="text/html" id="typeTpl">
        {{ d.order_type_name }}
    </script>
    <script type="text/html" id="logBtnTpl">
        <span lay-event="viewLog" title="日志" style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;cursor:pointer;color:#1e9fff;"><i class="layui-icon layui-icon-log"></i></span>
    </script>
    <script type="text/html" id="settlementTpl">
        {{# if(d.state === 6 && d.settlement_state === 'settled'){ }}
        <span style="color:#16a085;font-weight:600;"><i class="fas fa-check-circle"></i> 已结算</span>
        {{# } else { }}
        <span style="color:#999;"><i class="fas fa-clock"></i> 未结算</span>
        {{# } }}
    </script>
    <script type="text/html" id="imgTpl">
        {{# var cnt = d.image_count || 0; }}
        {{# if(cnt > 0){ }}<span class="img-count" lay-event="viewImg">{{ cnt }}张</span>{{# } else { }}<span style="color:#ccc">0张</span>{{# } }}
        {{# if(d.state !== 6){ }}
        <span lay-event="uploadImg" title="上传/管理截图" style="display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;cursor:pointer;color:#807dba;"><i class="layui-icon layui-icon-upload"></i></span>
        {{# } }}
    </script>
    <script type="text/html" id="payStatusTpl">
        {{# if(d.pay_status === 'unpaid' || d.pay_status == 0){ }}<span class="pay-no">未收款</span>{{# } else { }}<span class="pay-yes">已收款</span>{{# } }}
    </script>
    <script type="text/html" id="toolDemo">
        <div class="layui-clear-space">
            {{# if(d.state === 4){ }}
            <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="finish">提交验收</a>
            {{# } }}
        </div>
    </script>
    {% endraw %}

    <div id="logModal" style="display:none; padding: 15px;">
        <div id="logList" style="max-height: 350px; overflow-y: auto; margin-bottom: 10px;"></div>
        <div id="logEditor" style="display:flex; gap:8px;">
            <input type="text" id="logInput" class="layui-input" placeholder="输入日志内容" style="flex:1;">
            <button class="layui-btn layui-btn-sm" id="addLogBtn" style="background:#807dba;">添加</button>
        </div>
    </div>

    <div id="imgModal" style="display:none; padding: 15px;">
        <div id="imgList" style="max-height: 300px; overflow-y: auto; margin-bottom: 10px;"></div>
        <div class="drop-zone" id="dropZone">
            <i class="layui-icon layui-icon-upload"></i>
            拖拽图片到此处上传，或点击选择文件
        </div>
        <input type="file" id="imgFileInput" multiple accept="image/*" style="display:none;">
    </div>

    <div id="stateModal" style="display:none; padding: 20px;">
        <input type="hidden" name="id" id="stateId">
        <div id="stateRadioGroup" style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;">
            <label class="state-radio state-radio-3"><input type="radio" name="new_state" value="3"><span class="state state-3">待上号</span></label>
            <label class="state-radio state-radio-4"><input type="radio" name="new_state" value="4"><span class="state state-4">代练中</span></label>
            <label class="state-radio state-radio-5"><input type="radio" name="new_state" value="5"><span class="state state-5">待验收</span></label>
            <label class="state-radio state-radio-12"><input type="radio" name="new_state" value="12"><span class="state state-12">问题单</span></label>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/layui.js"></script>
    <script>
        var TOKEN = new URLSearchParams(window.location.search).get('token') || sessionStorage.getItem('auth_token') || '';
        $.ajaxSetup({ beforeSend: function(xhr) { if (TOKEN) xhr.setRequestHeader('Authorization', 'Bearer ' + TOKEN); } });
        $(document).ajaxError(function(event, xhr) {
            if (xhr.status === 401) { sessionStorage.removeItem('auth_token'); window.top.location.href = '/login'; }
            else if (xhr.status === 403) { layui.layer.alert('权限不足，可能存在账号冲突，请重新登录', {icon:2}, function(){ window.top.location.href = '/login'; }); }
        });
        function tk(url) { return url + (url.indexOf('?') > -1 ? '&' : '?') + 'token=' + TOKEN; }
        layui.use(['table', 'layer', 'form'], function() {
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;
            var mobileMq = window.matchMedia ? window.matchMedia('(max-width: 768px)') : { matches: false };
            var mobileOrders = {};

            function isMobileView() { return mobileMq.matches; }
            function escapeHtml(text) {
                return String(text == null ? '' : text).replace(/[&<>"']/g, function(ch) {
                    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[ch];
                });
            }
            function shortOrderNo(orderNo) {
                orderNo = String(orderNo || '');
                return orderNo.length > 13 ? orderNo.slice(0, 10) + '...' : orderNo;
            }
            function shortTime(value) {
                if (!value) return '--';
                var m = String(value).match(/(\d{2}:\d{2})/);
                return m ? m[1] : String(value).slice(0, 5);
            }
            function orderTypeText(d) {
                return d.order_type_name || (d.order_type == 1 ? '陪玩项目' : '代练项目');
            }
            function renderMobileCards(rows) {
                mobileOrders = {};
                if (!rows || !rows.length) {
                    $('#mobileOrderList').html('<div class="mobile-empty">暂无订单</div>');
                    return;
                }
                var html = '';
                rows.forEach(function(d) {
                    mobileOrders[d.id] = d;
                    var stateNum = Number(d.state);
                    var done = stateNum === 6;
                    var waitingReview = stateNum === 5;
                    var canSubmitReview = [3, 4, 12].indexOf(stateNum) >= 0;
                    var statusText = d.state_name || (done ? '已完成' : '当前状态');
                    var canUpload = !done;
                    html += '<div class="mobile-order-card" data-id="' + d.id + '">';
                    html += '<div class="mobile-card-top">';
                    html += '<div class="mobile-card-no" title="' + escapeHtml(d.order_no || '') + '"><i class="far fa-clipboard"></i>' + escapeHtml(shortOrderNo(d.order_no)) + '</div>';
                    if (d.has_account_info) html += '<span class="mobile-card-pill">账号密码</span>';
                    html += '<span class="mobile-card-pill mobile-card-state">' + escapeHtml(statusText) + '</span>';
                    html += '</div>';
                    html += '<div class="mobile-card-type">' + escapeHtml(orderTypeText(d)) + '</div>';
                    html += '<div class="mobile-card-title">' + escapeHtml(d.title || '-') + '</div>';
                    html += '<div class="mobile-card-grid">';
                    html += '<div><div class="mobile-card-label">角色名称</div><div class="mobile-card-value">' + escapeHtml(d.character_name || '--') + '</div></div>';
                    html += '<div><div class="mobile-card-label">接手价格</div><div class="mobile-card-value">¥' + Number(d.cost || 0).toFixed(2) + '</div></div>';
                    html += '<div><div class="mobile-card-label">接手时间</div><div class="mobile-card-value">' + escapeHtml(shortTime(d.received_at || d.assigned_at || d.updated_at || d.created_at)) + '</div></div>';
                    html += '<div><div class="mobile-card-label">当前状态</div><div class="mobile-card-value' + (done ? '' : ' mobile-card-overdue') + '">' + escapeHtml(statusText) + '</div></div>';
                    html += '<div><div class="mobile-card-label">结算状态</div><div class="mobile-card-value">' + escapeHtml(done && d.settlement_state === 'settled' ? '已结算' : '未结算') + '</div></div>';
                    if (done && d.settlement_state === 'settled' && d.settled_at) {
                        html += '<div><div class="mobile-card-label">结算时间</div><div class="mobile-card-value">' + escapeHtml(shortTime(d.settled_at)) + '</div></div>';
                    }
                    html += '</div>';
                    html += '<div class="mobile-card-actions">';
                    html += '<button type="button" class="mobile-upload-btn" data-id="' + d.id + '"' + (canUpload ? '' : ' disabled') + '>上传</button>';
                    html += '<button type="button" class="mobile-view-btn" data-id="' + d.id + '">查看</button>';
                    html += '<button type="button" class="mobile-submit-review-btn' + (canSubmitReview ? ' is-active' : '') + '" data-id="' + d.id + '"' + (canSubmitReview ? '' : ' disabled') + '>' + escapeHtml(done ? '已完成' : (waitingReview ? '待验收' : '提交验收')) + '</button>';
                    html += '</div></div>';
                });
                $('#mobileOrderList').html(html);
            }
            function loadMobileCards() {
                if (!isMobileView()) return;
                $.get(tk('/api/orders?view=paidan&limit=100'), function(res) {
                    renderMobileCards(res.data || []);
                });
            }
            function refreshPaidanViews() {
                table.reload('listTable');
                loadMobileCards();
            }
            function submitReviewOrder(orderId) {
                layer.confirm('确定提交验收？', function(idx) {
                    $.ajax({
                        url: tk('/api/orders/' + orderId + '/finish'), method: 'POST',
                        success: function(res) {
                            if (res.code === 1) { refreshPaidanViews(); layer.msg(res.msg, {icon:1}); }
                            else { layer.msg(res.msg || '提交失败', {icon:2}); }
                            layer.close(idx);
                        }
                    });
                });
            }

            $.get('/api/games', function(res) {
                var html = '<option value="">全部游戏</option>';
                (res.data || []).forEach(function(g) { html += '<option value="'+g.id+'">'+g.name+'</option>'; });
                $('#game_id').html(html);
                form.render('select');
            });

            form.on('select(game_id)', function(data) {
                var gid = data.value;
                if (!gid) {
                    $('#area_id').html('<option value="">全部大区</option>');
                    $('#server_id').html('<option value="">全部服务器</option>');
                    form.render('select');
                    return;
                }
                $.get('/api/games/' + gid + '/areas', function(res) {
                    var html = '<option value="">全部大区</option>';
                    (res.data || []).forEach(function(a) { html += '<option value="'+a.id+'">'+a.name+'</option>'; });
                    $('#area_id').html(html);
                    $('#server_id').html('<option value="">全部服务器</option>');
                    form.render('select');
                });
            });

            form.on('select(area_id)', function(data) {
                var aid = data.value;
                if (!aid) {
                    $('#server_id').html('<option value="">全部服务器</option>');
                    form.render('select');
                    return;
                }
                $.get('/api/game_areas/' + aid + '/servers', function(res) {
                    var html = '<option value="">全部服务器</option>';
                    (res.data || []).forEach(function(s) { html += '<option value="'+s.id+'">'+s.name+'</option>'; });
                    $('#server_id').html(html);
                    form.render('select');
                });
            });

            var isDashi = false;
            $.ajax({ url: tk('/api/current_user'), async: false, success: function(res) { if (res.code === 1 && res.data) isDashi = (res.data.role_level || 99) >= 4; } });

            var paidanCols = [
                { field: 'id', title: 'ID', width: 60, sort: true },
                { field: 'order_no', title: '订单号', width: 180 },
                { field: 'game_name', title: '游戏', width: 100 },
                { field: 'game_area', title: '大区', width: 90 },
                { field: 'title', title: '标题', width: 150 },
                { field: 'order_type', title: '类型', width: 80, templet: '#typeTpl' },
                { field: 'state', title: '状态', width: 80, templet: '#stateTpl' },
                { field: 'cost', title: '接单价', width: 80 }
            ];
            if (!isDashi) {
                paidanCols.push({ field: 'pay_status', title: '收款', width: 75, templet: '#payStatusTpl' });
            }
            paidanCols.push({ field: 'is_priority', title: '加急', width: 60, templet: '#priorityTpl' });
            paidanCols.push({ field: 'creator_name', title: '录单人', width: 80 });
            paidanCols.push({ field: 'received_at', title: '接手/指派时间', width: 160, templet: function(d) { return d.received_at || d.assigned_at || d.updated_at || d.created_at || ''; } });
            paidanCols.push({ field: 'settlement_state', title: '结算状态', width: 95, templet: '#settlementTpl' });
            paidanCols.push({ field: 'settled_at', title: '结算时间', width: 150, templet: function(d) { return d.state === 6 && d.settlement_state === 'settled' ? (d.settled_at || '') : ''; } });
            paidanCols.push({ field: 'image_count', title: '截图', width: 85, templet: '#imgTpl', align: 'center' });
            paidanCols.push({ title: '日志', width: 55, templet: '#logBtnTpl', align: 'center' });
            paidanCols.push({ title: '操作', toolbar: '#toolDemo', width: 110, align: 'center', fixed: 'right' });

            table.render({
                elem: '#listTable',
                url: tk('/api/orders?view=paidan'),
                page: true,
                limit: 15,
                cols: [paidanCols],
                parseData: function(res) {
                    return { "code": res.code, "msg": "", "count": res.count, "data": res.data };
                }
            });
            loadMobileCards();

            $('#searchBtn').on('click', function() {
                table.reload('listTable', { where: {
                    game_id: $('#game_id').val(),
                    state: $('#state').val(),
                    order_type: $('#order_type').val(),
                    keyword: $('#keyword').val(),
                    pay_status: $('#pay_status').val(),
                    is_urgent: $('#is_urgent').val()
                }});
                loadMobileCards();
            });
            $('#refreshBtn').on('click', refreshPaidanViews);
            $('#mobileRefreshBtn').on('click', loadMobileCards);
            // 财务端结算后，打手端在页面停留期间自动同步最新结算状态。
            setInterval(function() {
                if (document.visibilityState === 'visible') refreshPaidanViews();
            }, 15000);
            $('#mobileBackBtn').on('click', function() {
                if (window.mobileSafeBack) window.mobileSafeBack('/');
                else window.location.replace('/');
            });

            table.on('tool(listTable)', function(obj) {
                if (obj.event === 'editState') {
                    if (obj.data.state === 6) { layer.msg('已完成订单不可修改', {icon:0}); return; }
                    if (isDashi) {
                        if ([3, 4, 12].indexOf(Number(obj.data.state)) === -1) { layer.msg('当前状态不可提交验收', {icon:0}); return; }
                        submitReviewOrder(obj.data.id);
                        return;
                    }
                    var oid = obj.data.id;
                    $('#stateId').val(oid);
                    $('#stateRadioGroup input[name="new_state"]').prop('checked', false);
                    $('#stateRadioGroup .state-radio').removeClass('active');
                    var $target = $('#stateRadioGroup input[name="new_state"][value="' + obj.data.state + '"]');
                    $target.prop('checked', true);
                    $target.closest('.state-radio').addClass('active');
                    layer.open({
                        type: 1, title: '修改订单状态 - ' + (obj.data.order_no || ''), area: ['520px', '320px'],
                        content: $('#stateModal'),
                        btn: ['确定', '取消'],
                        yes: function(index) {
                            var st = parseInt($('#stateRadioGroup input[name="new_state"]:checked').val());
                            if (isNaN(st)) { layer.msg('请选择状态', {icon:0}); return; }
                            $.ajax({
                                url: tk('/api/orders/' + oid), method: 'PUT',
                                contentType: 'application/json', data: JSON.stringify({ state: st }),
                                success: function(res) {
                                    if (res.code === 1) { refreshPaidanViews(); layer.close(index); layer.msg(res.msg, {icon:1}); }
                                    else { layer.msg(res.msg || '修改失败', {icon:2}); }
                                }
                            });
                        }
                    });
                } else if (obj.event === 'finish') {
                    submitReviewOrder(obj.data.id);
                } else if (obj.event === 'viewLog') {
                    var oid = obj.data.id;
                    $('#logEditor').toggle(obj.data.state !== 6);
                    $.get(tk('/api/orders/' + oid + '/logs'), function(res) {
                        var html = '';
                        (res.data || []).forEach(function(l) {
                            html += '<div class="log-item"><span class="log-time">[' + (l.created_at || '') + ']</span><span class="log-user">[' + (l.username || '') + ']</span>' + (l.content || '') + '</div>';
                        });
                        if (!html) html = '<div style="color:#999;text-align:center;padding:20px;">暂无日志</div>';
                        $('#logList').html(html);
                    });
                    layer.open({
                        type: 1, title: (obj.data.order_no || '') + '的订单日志', area: ['550px', '480px'],
                        content: $('#logModal')
                    });
                    $('#addLogBtn').off('click').on('click', function() {
                        var content = $('#logInput').val().trim();
                        if (!content) { layer.msg('请输入日志内容', {icon:0}); return; }
                        $.ajax({
                            url: tk('/api/orders/' + oid + '/logs'), method: 'POST',
                            contentType: 'application/json', data: JSON.stringify({ content: content }),
                            success: function(res) {
                                if (res.code === 1) {
                                    $.get(tk('/api/orders/' + oid + '/logs'), function(r2) {
                                        var h = '';
                                        (r2.data || []).forEach(function(l) { h += '<div class="log-item"><span class="log-time">[' + (l.created_at || '') + ']</span><span class="log-user">[' + (l.username || '') + ']</span>' + (l.content || '') + '</div>'; });
                                        if (!h) h = '<div style="color:#999;text-align:center;padding:20px;">暂无日志</div>';
                                        $('#logList').html(h);
                                    });
                                    refreshPaidanViews();
                                    $('#logInput').val(''); layer.msg('已添加', {icon:1});
                                } else { layer.msg(res.msg || '添加失败', {icon:2}); }
                            }
                        });
                    });
                } else if (obj.event === 'viewImg') {
                    var oid = obj.data.id;
                    currentPaidanReadOnly = obj.data.state === 6;
                    loadPaidanImages(oid);
                    var imgIdx = layer.open({
                        type: 1, title: (obj.data.order_no || '') + '的截图', area: ['600px', '480px'],
                        content: $('#imgModal')
                    });
                } else if (obj.event === 'uploadImg') {
                    if (obj.data.state === 6) { layer.msg('已完成订单不可修改', {icon:0}); return; }
                    var oid = obj.data.id;
                    currentPaidanReadOnly = false;
                    loadPaidanImages(oid);
                    layer.open({
                        type: 1, title: (obj.data.order_no || '') + '的截图', area: ['600px', '480px'],
                        content: $('#imgModal')
                    });
                }
            });

            $(document).on('click', '.state-radio', function() {
                $(this).find('input[type="radio"]').prop('checked', true);
                $('#stateRadioGroup .state-radio').removeClass('active');
                $(this).addClass('active');
            });

            var currentPaidanImgOid = null;
            var currentPaidanReadOnly = false;
            function loadPaidanImages(oid) {
                currentPaidanImgOid = oid;
                $('#dropZone').toggle(!currentPaidanReadOnly);
                $.get(tk('/api/orders/' + oid + '/images'), function(res) {
                    var html = '';
                    (res.data || []).forEach(function(img) {
                        html += '<div class="img-wrap"><img class="img-thumb" src="' + img.url + '" onclick="layui.layer.photos({photos:{data:[{alt:\'\',src:\'' + img.url + '\'}]}})">';
                        if (!currentPaidanReadOnly) html += '<button class="img-del" data-iid="' + img.id + '" data-oid="' + oid + '">&times;</button>';
                        html += '</div>';
                    });
                    if (!html) html = '<div style="color:#999;text-align:center;padding:20px;">暂无图片</div>';
                    $('#imgList').html(html);
                });
            }

            $(document).on('click', '#imgModal .img-del', function() {
                var iid = $(this).data('iid');
                var oid = $(this).data('oid');
                layer.confirm('确定删除该图片？', {icon:3}, function(idx) {
                    $.ajax({
                        url: tk('/api/order_images/' + iid), method: 'DELETE',
                        success: function(res) {
                            if (res.code === 1) { loadPaidanImages(oid); refreshPaidanViews(); layer.close(idx); layer.msg('已删除', {icon:1}); }
                            else { layer.msg(res.msg || '删除失败', {icon:2}); }
                        }
                    });
                });
            });

            function uploadPaidanImgFiles(files) {
                if (currentPaidanReadOnly) { layer.msg('已完成订单不可修改', {icon:0}); return; }
                if (!currentPaidanImgOid || !files.length) return;
                var fd = new FormData();
                for (var i = 0; i < files.length; i++) {
                    if (files[i].type.startsWith('image/')) fd.append('file', files[i]);
                }
                if (!fd.has('file')) { layer.msg('请选择图片文件', {icon:0}); return; }
                $.ajax({
                    url: tk('/api/orders/' + currentPaidanImgOid + '/images'), method: 'POST',
                    data: fd, processData: false, contentType: false,
                    success: function(res) {
                        if (res.code === 1) { loadPaidanImages(currentPaidanImgOid); refreshPaidanViews(); layer.msg('上传成功', {icon:1}); }
                        else { layer.msg(res.msg || '上传失败', {icon:2}); }
                    }
                });
            }

            $('#dropZone').on('click', function() { $('#imgFileInput').click(); });
            $('#dropZone').on('dragover', function(e) { e.preventDefault(); e.stopPropagation(); $(this).addClass('drag-over'); });
            $('#dropZone').on('dragleave drop', function(e) { e.preventDefault(); e.stopPropagation(); $(this).removeClass('drag-over'); });
            $('#dropZone').on('drop', function(e) { uploadPaidanImgFiles(e.originalEvent.dataTransfer.files); });
            $('#imgFileInput').on('change', function() { uploadPaidanImgFiles(this.files); this.value = ''; });

            $(document).on('click', '.mobile-upload-btn', function() {
                var data = mobileOrders[$(this).data('id')];
                if (!data) return;
                if (data.state === 6) { layer.msg('已完成订单不可修改', {icon:0}); return; }
                currentPaidanReadOnly = false;
                loadPaidanImages(data.id);
                layer.open({
                    type: 1, title: (data.order_no || '') + '的截图', area: ['600px', '480px'],
                    content: $('#imgModal')
                });
            });

            $(document).on('click', '.mobile-view-btn', function() {
                var data = mobileOrders[$(this).data('id')];
                if (!data) return;
                layer.open({
                    type: 2,
                    title: data.order_no || '订单详情',
                    area: isMobileView() ? ['100%', '100%'] : ['900px', '650px'],
                    content: tk('/order_detail?id=' + data.id)
                });
            });

            $(document).on('click', '.mobile-submit-review-btn', function() {
                var data = mobileOrders[$(this).data('id')];
                if (!data || [3, 4, 12].indexOf(Number(data.state)) === -1) return;
                submitReviewOrder(data.id);
            });
        });
    </script>
</body>
</html>
