<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>游戏与区服管理</title>
    <link href="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/css/layui.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f4f5f7; font-family: 'Microsoft YaHei', sans-serif; margin: 0; padding: 0; }
        .content { padding: 15px; }
        .panel { background: #fff; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .panel-body { padding: 15px; }
        .toolbar { margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; }
        .layui-table-cell { padding: 8px 6px !important; }
        .layui-btn-xs { height: 24px; line-height: 24px; padding: 0 8px; font-size: 12px; }
        .game-card { display: inline-block; background: linear-gradient(135deg, #708eea, #a855f7); color: #fff; padding: 4px 12px; border-radius: 4px; font-size: 13px; }
        .tab-content-area { padding: 15px 0; }
    </style>
</head>
<body>
    <div class="content">
        <div class="panel">
            <div class="panel-body">
                <div class="layui-tab layui-tab-brief" lay-filter="gameTab">
                    <ul class="layui-tab-title">
                        <li class="layui-this">游戏管理</li>
                        <li>大区/平台管理</li>
                        <li>服务器管理</li>
                    </ul>
                    <div class="layui-tab-content">
                        <div class="layui-tab-item layui-show">
                            <div class="toolbar">
                                <a href="javascript:;" class="layui-btn layui-btn-primary" id="refreshGame"><i class="fas fa-refresh"></i> 刷新</a>
                                <a href="javascript:;" class="layui-btn layui-btn-normal" id="addGame"><i class="fas fa-plus"></i> 新增游戏</a>
                            </div>
                            <table class="layui-table" id="gameTable" lay-filter="gameTable"></table>
                        </div>
                        <div class="layui-tab-item">
                            <div class="toolbar">
                                <label style="line-height:32px;margin-right:5px;">选择游戏：</label>
                                <select id="areaGameId" lay-filter="areaGameId" lay-search style="width:200px;height:32px;"></select>
                                <a href="javascript:;" class="layui-btn layui-btn-primary" id="refreshArea"><i class="fas fa-refresh"></i> 刷新</a>
                                <a href="javascript:;" class="layui-btn layui-btn-normal" id="addArea"><i class="fas fa-plus"></i> 新增大区</a>
                            </div>
                            <table class="layui-table" id="areaTable" lay-filter="areaTable"></table>
                        </div>
                        <div class="layui-tab-item">
                            <div class="toolbar">
                                <label style="line-height:32px;margin-right:5px;">选择游戏：</label>
                                <select id="srvGameId" lay-filter="srvGameId" lay-search style="width:200px;height:32px;"></select>
                                <label style="line-height:32px;margin-right:5px;margin-left:10px;">选择大区：</label>
                                <select id="srvAreaId" lay-filter="srvAreaId" lay-search style="width:200px;height:32px;"></select>
                                <a href="javascript:;" class="layui-btn layui-btn-primary" id="refreshSrv"><i class="fas fa-refresh"></i> 刷新</a>
                                <a href="javascript:;" class="layui-btn layui-btn-normal" id="addSrv"><i class="fas fa-plus"></i> 新增服务器</a>
                            </div>
                            <table class="layui-table" id="srvTable" lay-filter="srvTable"></table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/html" id="gameTool">
        <div class="layui-clear-space">
            <a class="layui-btn layui-btn-xs layui-btn-warning" lay-event="edit">修改</a>
            <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
        </div>
    </script>
    <script type="text/html" id="areaTool">
        <div class="layui-clear-space">
            <a class="layui-btn layui-btn-xs layui-btn-warning" lay-event="edit">修改</a>
            <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
        </div>
    </script>
    <script type="text/html" id="srvTool">
        <div class="layui-clear-space">
            <a class="layui-btn layui-btn-xs layui-btn-warning" lay-event="edit">修改</a>
            <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
        </div>
    </script>

    <div id="gameModal" style="display:none;padding:20px;">
        <form class="layui-form layui-form-pane" id="gameForm">
            <input type="hidden" name="id" id="gameEditId">
            <div class="layui-form-item">
                <label class="layui-form-label">游戏名称</label>
                <div class="layui-input-block"><input type="text" name="name" id="gameName" class="layui-input" lay-verify="required"></div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">排序</label>
                <div class="layui-input-block"><input type="number" name="sort" id="gameSort" class="layui-input" value="0"></div>
            </div>
        </form>
    </div>

    <div id="areaModal" style="display:none;padding:20px;">
        <form class="layui-form layui-form-pane" id="areaForm">
            <input type="hidden" name="id" id="areaEditId">
            <div class="layui-form-item">
                <label class="layui-form-label">大区名称</label>
                <div class="layui-input-block"><input type="text" name="name" id="areaName" class="layui-input" lay-verify="required"></div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">排序</label>
                <div class="layui-input-block"><input type="number" name="sort" id="areaSort" class="layui-input" value="0"></div>
            </div>
        </form>
    </div>

    <div id="srvModal" style="display:none;padding:20px;">
        <form class="layui-form layui-form-pane" id="srvForm">
            <input type="hidden" name="id" id="srvEditId">
            <div class="layui-form-item">
                <label class="layui-form-label">服务器名称</label>
                <div class="layui-input-block"><input type="text" name="name" id="srvName" class="layui-input" lay-verify="required"></div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">排序</label>
                <div class="layui-input-block"><input type="number" name="sort" id="srvSort" class="layui-input" value="0"></div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/layui.js"></script>
    <script>
        var TOKEN = new URLSearchParams(window.location.search).get('token') || sessionStorage.getItem('auth_token') || '';
        $.ajaxSetup({ beforeSend: function(xhr) { if (TOKEN) xhr.setRequestHeader('Authorization', 'Bearer ' + TOKEN); } });
        $(document).ajaxError(function(event, xhr) {
            if (xhr.status === 401) { sessionStorage.removeItem('auth_token'); window.top.location.href = '/login'; }
            else if (xhr.status === 403) { layui.layer.alert('权限不足，可能存在账号冲突，请重新登录', {icon:2}, function(){ window.top.location.href = '/login'; }); }
        });
        var gamesData = [];
        layui.use(['table', 'layer', 'form', 'element'], function() {
            var table = layui.table, layer = layui.layer, form = layui.form, element = layui.element;

            function loadGames(cb) {
                $.get('/api/games', function(res) {
                    gamesData = res.data || [];
                    if (cb) cb();
                });
            }

            function fillGameSelect(selId) {
                var html = '<option value="">请选择游戏</option>';
                gamesData.forEach(function(g) { html += '<option value="'+g.id+'">'+g.name+'</option>'; });
                $('#' + selId).html(html);
                form.render('select');
            }

            loadGames(function() {
                fillGameSelect('areaGameId');
                fillGameSelect('srvGameId');
            });

            // ===== 游戏表格 =====
            table.render({ elem: '#gameTable', url: '/api/games?token=' + TOKEN, page: true, limit: 15,
                cols: [[
                    { field: 'id', title: 'ID', width: 60, sort: true },
                    { field: 'name', title: '游戏名称', width: 200 },
                    { field: 'area_count', title: '大区数', width: 100 },
                    { field: 'sort', title: '排序', width: 80 },
                    { field: 'created_at', title: '创建时间', width: 170 },
                    { title: '操作', toolbar: '#gameTool', width: 150, align: 'center' }
                ]],
                parseData: function(res) { return { code: res.code, msg: '', count: res.count, data: res.data }; }
            });

            $('#refreshGame').on('click', function() { table.reload('gameTable'); });
            $('#addGame').on('click', function() {
                $('#gameEditId').val(''); $('#gameForm')[0].reset();
                layer.open({ type:1, title:'新增游戏', area:['400px','220px'], content:$('#gameModal'),
                    btn:['确定','取消'],
                    yes: function(idx) {
                        $.post('/api/games?token='+TOKEN, JSON.stringify({ name:$('#gameName').val(), sort:parseInt($('#gameSort').val())||0 }),
                        function(res) { if(res.code===1){table.reload('gameTable');loadGames(function(){fillGameSelect('areaGameId');fillGameSelect('srvGameId')});layer.close(idx);layer.msg(res.msg,{icon:1})}else{layer.msg(res.msg,{icon:2})} });
                    }
                });
            });

            table.on('tool(gameTable)', function(obj) {
                if (obj.event==='edit') {
                    $('#gameEditId').val(obj.data.id); $('#gameName').val(obj.data.name); $('#gameSort').val(obj.data.sort);
                    layer.open({ type:1, title:'修改游戏', area:['400px','220px'], content:$('#gameModal'),
                        btn:['确定','取消'],
                        yes: function(idx) {
                            $.ajax({ url:'/api/games/'+obj.data.id+'?token='+TOKEN, method:'PUT', contentType:'application/json',
                                data:JSON.stringify({ name:$('#gameName').val(), sort:parseInt($('#gameSort').val())||0 }),
                                success:function(res){if(res.code===1){table.reload('gameTable');loadGames(function(){fillGameSelect('areaGameId');fillGameSelect('srvGameId')});layer.close(idx);layer.msg(res.msg,{icon:1})}else{layer.msg(res.msg,{icon:2})}}
                            });
                        }
                    });
                } else if (obj.event==='del') {
                    layer.confirm('删除游戏将同时删除其下所有大区和服务器，确定？', function(idx) {
                        $.ajax({ url:'/api/games/'+obj.data.id+'?token='+TOKEN, method:'DELETE',
                            success:function(res){if(res.code===1){table.reload('gameTable');loadGames(function(){fillGameSelect('areaGameId');fillGameSelect('srvGameId')});layer.msg(res.msg,{icon:1})}else{layer.msg(res.msg,{icon:2})}layer.close(idx)}
                        });
                    });
                }
            });

            // ===== 大区表格 =====
            var areaGameId = '';
            form.on('select(areaGameId)', function(data) { areaGameId = data.value; loadAreas(); });
            function loadAreas() {
                if (!areaGameId) return;
                $.get('/api/games/'+areaGameId+'/areas', function(res) {
                    table.reload('areaTable', { url:'', data: res.data||[], page:{curr:1} });
                });
            }
            table.render({ elem:'#areaTable', data:[], page:true, limit:15,
                cols:[[
                    { field:'id', title:'ID', width:60, sort:true },
                    { field:'name', title:'大区名称', width:200 },
                    { field:'server_count', title:'服务器数', width:100 },
                    { field:'sort', title:'排序', width:80 },
                    { title:'操作', toolbar:'#areaTool', width:150, align:'center' }
                ]]
            });
            $('#refreshArea').on('click', function() { loadAreas(); });
            $('#addArea').on('click', function() {
                if(!areaGameId){layer.msg('请先选择游戏',{icon:2});return}
                $('#areaEditId').val('');$('#areaForm')[0].reset();
                layer.open({ type:1, title:'新增大区', area:['400px','220px'], content:$('#areaModal'),
                    btn:['确定','取消'],
                    yes: function(idx) {
                        $.post('/api/games/'+areaGameId+'/areas?token='+TOKEN, JSON.stringify({name:$('#areaName').val(),sort:parseInt($('#areaSort').val())||0}),
                        function(res){if(res.code===1){loadAreas();layer.close(idx);layer.msg(res.msg,{icon:1})}else{layer.msg(res.msg,{icon:2})}});
                    }
                });
            });
            table.on('tool(areaTable)', function(obj) {
                if(obj.event==='edit'){
                    $('#areaEditId').val(obj.data.id);$('#areaName').val(obj.data.name);$('#areaSort').val(obj.data.sort);
                    layer.open({type:1,title:'修改大区',area:['400px','220px'],content:$('#areaModal'),btn:['确定','取消'],
                        yes:function(idx){$.ajax({url:'/api/game_areas/'+obj.data.id+'?token='+TOKEN,method:'PUT',contentType:'application/json',data:JSON.stringify({name:$('#areaName').val(),sort:parseInt($('#areaSort').val())||0}),success:function(res){if(res.code===1){loadAreas();layer.close(idx);layer.msg(res.msg,{icon:1})}else{layer.msg(res.msg,{icon:2})}}});}
                    });
                }else if(obj.event==='del'){
                    layer.confirm('删除大区将同时删除其下所有服务器，确定？',function(idx){$.ajax({url:'/api/game_areas/'+obj.data.id+'?token='+TOKEN,method:'DELETE',success:function(res){if(res.code===1){loadAreas();layer.msg(res.msg,{icon:1})}else{layer.msg(res.msg,{icon:2})}layer.close(idx)}});});
                }
            });

            // ===== 服务器表格 =====
            var srvGameId='', srvAreaId='';
            form.on('select(srvGameId)', function(data) {
                srvGameId=data.value; srvAreaId='';
                if(!srvGameId){$('#srvAreaId').html('<option value="">请先选游戏</option>');form.render('select');return}
                $.get('/api/games/'+srvGameId+'/areas',function(res){
                    var h='<option value="">请选择大区</option>';
                    (res.data||[]).forEach(function(a){h+='<option value="'+a.id+'">'+a.name+'</option>'});
                    $('#srvAreaId').html(h);form.render('select');
                });
            });
            form.on('select(srvAreaId)', function(data) { srvAreaId=data.value; loadSrvs(); });
            function loadSrvs() {
                if(!srvAreaId) return;
                $.get('/api/game_areas/'+srvAreaId+'/servers',function(res){
                    table.reload('srvTable',{url:'',data:res.data||[],page:{curr:1}});
                });
            }
            table.render({elem:'#srvTable',data:[],page:true,limit:15,
                cols:[[
                    {field:'id',title:'ID',width:60,sort:true},
                    {field:'name',title:'服务器名称',width:200},
                    {field:'sort',title:'排序',width:80},
                    {title:'操作',toolbar:'#srvTool',width:150,align:'center'}
                ]]
            });
            $('#refreshSrv').on('click',function(){loadSrvs();});
            $('#addSrv').on('click',function(){
                if(!srvAreaId){layer.msg('请先选择游戏和大区',{icon:2});return}
                $('#srvEditId').val('');$('#srvForm')[0].reset();
                layer.open({type:1,title:'新增服务器',area:['400px','220px'],content:$('#srvModal'),btn:['确定','取消'],
                    yes:function(idx){$.post('/api/game_areas/'+srvAreaId+'/servers?token='+TOKEN,JSON.stringify({name:$('#srvName').val(),sort:parseInt($('#srvSort').val())||0}),function(res){if(res.code===1){loadSrvs();layer.close(idx);layer.msg(res.msg,{icon:1})}else{layer.msg(res.msg,{icon:2})}});}
                });
            });
            table.on('tool(srvTable)',function(obj){
                if(obj.event==='edit'){
                    $('#srvEditId').val(obj.data.id);$('#srvName').val(obj.data.name);$('#srvSort').val(obj.data.sort);
                    layer.open({type:1,title:'修改服务器',area:['400px','220px'],content:$('#srvModal'),btn:['确定','取消'],
                        yes:function(idx){$.ajax({url:'/api/game_servers/'+obj.data.id+'?token='+TOKEN,method:'PUT',contentType:'application/json',data:JSON.stringify({name:$('#srvName').val(),sort:parseInt($('#srvSort').val())||0}),success:function(res){if(res.code===1){loadSrvs();layer.close(idx);layer.msg(res.msg,{icon:1})}else{layer.msg(res.msg,{icon:2})}}});}
                    });
                }else if(obj.event==='del'){
                    layer.confirm('确定删除？',function(idx){$.ajax({url:'/api/game_servers/'+obj.data.id+'?token='+TOKEN,method:'DELETE',success:function(res){if(res.code===1){loadSrvs();layer.msg(res.msg,{icon:1})}else{layer.msg(res.msg,{icon:2})}layer.close(idx)}});});
                }
            });
        });
    </script>
</body>
</html>
