<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>用户管理</title>
    <link href="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/css/layui.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f4f5f7; font-family: 'Microsoft YaHei', sans-serif; margin: 0; padding: 0; }
        .content { padding: 15px; }
        .panel { background: #fff; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .panel-body { padding: 15px; }
        .toolbar { margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .layui-table-cell { padding: 8px 6px !important; }
        .layui-btn-xs { height: 24px; line-height: 24px; padding: 0 8px; font-size: 12px; }
        .agent-badge { background: linear-gradient(135deg, #708eea, #a855f7); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .status-normal { color: #5FB878; font-weight: bold; }
        .status-hidden { color: #999; }
        .form-section { border: 1px solid #e8e8e8; border-radius: 6px; padding: 6px 10px; margin-bottom: 6px; }
        .form-section-title { font-size: 13px; font-weight: bold; color: #807dba; margin-bottom: 4px; padding-bottom: 3px; border-bottom: 1px dashed #e0d5f0; }
        .layui-form-pane .layui-form-label { width: 100px !important; font-size: 12px !important; padding: 6px 8px !important; height: 30px !important; line-height: 18px !important; }
        .layui-form-pane .layui-input-block { margin-left: 100px !important; }
        .layui-form-pane .layui-input { height: 30px !important; font-size: 12px !important; }
        .layui-form-pane .layui-textarea { font-size: 12px !important; }
        .layui-form-item { margin-bottom: 4px !important; }
        .radio-group { display: flex; gap: 12px; align-items: center; padding: 2px 0; }
        .radio-group label { cursor: pointer; display: inline-flex; align-items: center; gap: 4px; font-size: 12px; }
        .game-checkbox-group { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px; max-height: 120px; overflow-y: auto; border: 1px solid #e8e8e8; border-radius: 4px; }
        .game-checkbox-group label { cursor: pointer; display: inline-flex; align-items: center; gap: 3px; font-size: 12px; min-width: 110px; }
        .range-input { display: flex; align-items: center; gap: 5px; }
        .range-input input { width: 100px; }
        .range-input span { color: #999; }
    </style>
</head>
<body>
    <div class="content">
        <div class="panel">
            <div class="panel-body">
                <div class="toolbar">
                    <a href="javascript:;" class="layui-btn layui-btn-primary" id="refreshBtn"><i class="fas fa-refresh"></i> 刷新</a>
                    <a href="javascript:;" class="layui-btn layui-btn-normal" id="addNew"><i class="fas fa-plus"></i> 新增用户</a>
                    <div class="layui-inline" style="margin-left: 15px;">
                        <input type="text" id="keyword" placeholder="搜索用户名/昵称" class="layui-input" style="width:200px;height:32px;">
                    </div>
                    <button class="layui-btn layui-btn-sm" id="searchBtn" style="background:#807dba;"><i class="fas fa-search"></i></button>
                </div>
                <table class="layui-table" id="listTable" lay-filter="listTable"></table>
            </div>
        </div>
    </div>

    <script type="text/html" id="toolDemo">
        <div class="layui-clear-space">
            <a class="layui-btn layui-btn-xs layui-btn-warning" lay-event="edit">修改</a>
            <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="agent">代理</a>
            <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
        </div>
    </script>

    {% raw %}
    <script type="text/html" id="agentTpl">
        {{#  if(d.is_agent){ }}
            <span class="agent-badge"><i class="fas fa-crown"></i> 代理L{{ d.agent_level }}</span>
        {{#  } else { }}
            <span style="color:#999;">普通用户</span>
        {{#  } }}
    </script>

    <script type="text/html" id="statusTpl">
        {{#  if(d.status === 'normal'){ }}
            <span class="status-normal">正常</span>
        {{#  } else { }}
            <span class="status-hidden">禁用</span>
        {{#  } }}
    </script>

    <script type="text/html" id="bizTpl">
        {{# var map = {'both':'代练+陪玩','dailian':'专做代练','peiwan':'专做陪玩'}; }}
        {{# var mtype = {'internal':'内部','partner':'合作'}; }}
        <span style="font-size:12px;">{{ map[d.business_type] || '代练+陪玩' }}</span>
        <span style="color:#999;font-size:11px;margin-left:4px;">({{ mtype[d.member_type] || '内部' }})</span>
    </script>
    {% endraw %}

    <div id="userModal" style="display:none; padding: 15px;">
        <form class="layui-form layui-form-pane" id="userForm" lay-filter="userForm">
            <input type="hidden" name="id" id="editId">
            <div style="display:flex;gap:20px;">
                <div style="flex:1;">
                    <div class="form-section">
                        <div class="form-section-title"><i class="fas fa-user"></i> 基础信息</div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">登录账号</label>
                            <div class="layui-input-block">
                                <input type="text" name="username" id="username" placeholder="推荐：手机号/QQ/姓名" lay-verify="required" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">账号名称</label>
                            <div class="layui-input-block">
                                <input type="text" name="nickname" id="nickname" placeholder="用户姓名或昵称" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">密码</label>
                            <div class="layui-input-block">
                                <input type="password" name="password" id="password" placeholder="新增必填，修改留空不改" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">身份证号</label>
                            <div class="layui-input-block">
                                <input type="text" name="id_card" id="id_card" placeholder="请输入身份证号" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">角色职位</label>
                            <div class="layui-input-block">
                                <select name="role_id" id="role_id" lay-filter="role_id"></select>
                            </div>
                        </div>
                    </div>
                    <div class="form-section">
                        <div class="form-section-title"><i class="fas fa-briefcase"></i> 业务配置</div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">业务类型</label>
                            <div class="layui-input-block">
                                <div class="radio-group">
                                    <label><input type="radio" name="business_type" value="both" checked> 代练+陪玩</label>
                                    <label><input type="radio" name="business_type" value="dailian"> 专做代练</label>
                                    <label><input type="radio" name="business_type" value="peiwan"> 专做陪玩</label>
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">成员类型</label>
                            <div class="layui-input-block">
                                <div class="radio-group">
                                    <label><input type="radio" name="member_type" value="internal" checked> 内部成员</label>
                                    <label><input type="radio" name="member_type" value="partner"> 合作用户</label>
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">提成模式</label>
                            <div class="layui-input-block">
                                <div class="radio-group">
                                    <label><input type="radio" name="commission_mode" value="fixed" checked> 固定金额</label>
                                    <label><input type="radio" name="commission_mode" value="percent"> 订单价百分比</label>
                                    <label><input type="radio" name="commission_mode" value="profit_percent"> 利润百分比</label>
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">提成金额</label>
                            <div class="layui-input-block">
                                <input type="number" name="commission_value" id="commission_value" value="0" step="0.01" class="layui-input" style="width:120px;display:inline-block;">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">状态</label>
                            <div class="layui-input-block">
                                <select name="status" id="status">
                                    <option value="normal">正常</option>
                                    <option value="hidden">禁用</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="form-section">
                        <div class="form-section-title"><i class="fas fa-money-bill-wave"></i> 结算信息</div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">支付宝账号</label>
                            <div class="layui-input-block">
                                <input type="text" name="alipay_account" id="alipay_account" placeholder="用来收款的支付账号" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">支付宝姓名</label>
                            <div class="layui-input-block">
                                <input type="text" name="alipay_name" id="alipay_name" placeholder="用来收款的支付姓名" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">微信账号</label>
                            <div class="layui-input-block">
                                <input type="text" name="wechat_account" id="wechat_account" placeholder="用来收款的微信账号" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">微信收款码</label>
                            <div class="layui-input-block">
                                <input type="text" name="wechat_qrcode" id="wechat_qrcode" placeholder="收款码图片URL" class="layui-input">
                            </div>
                        </div>
                    </div>
                </div>
                <div style="flex:1;">
                    <div class="form-section">
                        <div class="form-section-title"><i class="fas fa-gamepad"></i> 抢单设置</div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">抢代练单上限</label>
                            <div class="layui-input-block">
                                <input type="number" name="grab_limit_dailian" id="grab_limit_dailian" value="0" class="layui-input" style="width:100px;display:inline-block;">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">抢陪玩单上限</label>
                            <div class="layui-input-block">
                                <input type="number" name="grab_limit_peiwan" id="grab_limit_peiwan" value="0" class="layui-input" style="width:100px;display:inline-block;">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">抢单价范围</label>
                            <div class="layui-input-block">
                                <div class="range-input">
                                    <input type="number" name="grab_price_min" id="grab_price_min" value="0" step="0.01" class="layui-input" style="width:90px;display:inline-block;">
                                    <span>—</span>
                                    <input type="number" name="grab_price_max" id="grab_price_max" value="99999" step="0.01" class="layui-input" style="width:90px;display:inline-block;">
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">打手直播地址</label>
                            <div class="layui-input-block">
                                <input type="text" name="live_url" id="live_url" placeholder="打手直播的URL地址" class="layui-input">
                            </div>
                        </div>
                    </div>
                    <div class="form-section">
                        <div class="form-section-title"><i class="fas fa-address-card"></i> 联系与备注</div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">QQ/微信</label>
                            <div class="layui-input-block">
                                <input type="text" name="qq_wechat" id="qq_wechat" placeholder="联系QQ/微信" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">联系电话</label>
                            <div class="layui-input-block">
                                <input type="text" name="phone" id="phone" placeholder="联系手机号" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">入职日期</label>
                            <div class="layui-input-block">
                                <input type="text" name="hire_date" id="hire_date" placeholder="YYYY-MM-DD" class="layui-input" readonly>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">标记</label>
                            <div class="layui-input-block">
                                <input type="text" name="mark" id="mark" placeholder="用户标记" class="layui-input">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">已交保证金</label>
                            <div class="layui-input-block">
                                <input type="number" name="deposit" id="deposit" value="0" step="0.01" class="layui-input" style="width:120px;display:inline-block;">
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">录单不发短信</label>
                            <div class="layui-input-block">
                                <div class="radio-group">
                                    <label><input type="radio" name="no_sms" value="0" checked> 允许发送</label>
                                    <label><input type="radio" name="no_sms" value="1"> 不发短信</label>
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">备注说明</label>
                            <div class="layui-input-block">
                                <textarea name="remark" id="remark" class="layui-textarea" style="height:40px;" placeholder="备注说明"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="form-section">
                        <div class="form-section-title"><i class="fas fa-gamepad"></i> 游戏权限</div>
                        <div class="layui-form-item">
                            <label class="layui-form-label">全部游戏</label>
                            <div class="layui-input-block">
                                <div class="radio-group">
                                    <label><input type="radio" name="all_games" value="0" checked> 否</label>
                                    <label><input type="radio" name="all_games" value="1"> 是</label>
                                </div>
                            </div>
                        </div>
                        <div class="layui-form-item" id="gamePermSection">
                            <label class="layui-form-label">勾选游戏</label>
                            <div class="layui-input-block">
                                <div class="game-checkbox-group" id="gameCheckboxGroup"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>

    <div id="agentModal" style="display:none; padding: 20px;">
        <form class="layui-form layui-form-pane" id="agentForm" lay-filter="agentForm">
            <input type="hidden" name="uid" id="agentUid">
            <div class="layui-form-item" style="text-align:center; padding: 20px 0;">
                <div id="agentUserName" style="font-size:18px; font-weight:bold; color:#333;"></div>
                <div id="agentCurrentStatus" style="margin-top:8px;"></div>
            </div>
            <div class="layui-form-item" pane>
                <label class="layui-form-label">开通代理</label>
                <div class="layui-input-block">
                    <input type="checkbox" name="is_agent" id="is_agent" lay-skin="switch" lay-text="是|否">
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">代理等级</label>
                <div class="layui-input-block">
                    <select name="agent_level" id="agent_level">
                        <option value="0">普通代理</option>
                        <option value="1">一级代理</option>
                        <option value="2">二级代理</option>
                        <option value="3">三级代理</option>
                        <option value="4">四级代理</option>
                        <option value="5">五级代理</option>
                    </select>
                </div>
            </div>
            <div class="layui-form-item">
                <label class="layui-form-label">上级代理</label>
                <div class="layui-input-block">
                    <select name="parent_id" id="parent_id" lay-search>
                        <option value="">无</option>
                    </select>
                </div>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/layui.js"></script>
    <script>
        var TOKEN = new URLSearchParams(window.location.search).get('token') || sessionStorage.getItem('auth_token') || '';
        $.ajaxSetup({ beforeSend: function(xhr) { if (TOKEN) xhr.setRequestHeader('Authorization', 'Bearer ' + TOKEN); } });
        $(document).ajaxError(function(event, xhr) {
            if (xhr.status === 401) { sessionStorage.removeItem('auth_token'); window.top.location.href = '/login'; }
            else if (xhr.status === 403) { layui.layer.alert('权限不足', {icon:2}, function(){ window.top.location.href = '/login'; }); }
        });

        var rolesData = [];
        var gamesData = [];

        layui.use(['table', 'layer', 'form', 'laydate'], function() {
            var table = layui.table;
            var layer = layui.layer;
            var form = layui.form;
            var laydate = layui.laydate;

            laydate.render({ elem: '#hire_date', format: 'yyyy-MM-dd' });

            function loadRoles() {
                $.get('/api/roles?token=' + TOKEN, function(res) {
                    rolesData = res.data || [];
                    var html = '<option value="">请选择角色</option>';
                    rolesData.forEach(function(r) { html += '<option value="'+r.id+'">'+r.name+'</option>'; });
                    $('#role_id').html(html);
                    form.render('select');
                });
            }

            function loadGames() {
                $.get('/api/games?token=' + TOKEN, function(res) {
                    gamesData = res.data || [];
                    var html = '';
                    gamesData.forEach(function(g) {
                        html += '<label><input type="checkbox" name="game_perm" value="'+g.id+'"> '+g.name+'</label>';
                    });
                    $('#gameCheckboxGroup').html(html);
                });
            }

            function loadAgents() {
                $.get('/api/users?limit=999&token=' + TOKEN, function(res) {
                    var html = '<option value="">无</option>';
                    (res.data || []).forEach(function(u) {
                        if (u.is_agent) html += '<option value="'+u.id+'">'+u.nickname+' (L'+u.agent_level+')</option>';
                    });
                    $('#parent_id').html(html);
                    form.render('select');
                });
            }

            loadRoles();
            loadGames();
            loadAgents();

            $(document).on('change', 'input[name="all_games"]', function() {
                if ($(this).val() === '1') {
                    $('#gamePermSection').hide();
                } else {
                    $('#gamePermSection').show();
                }
            });

            table.render({
                elem: '#listTable',
                url: '/api/users?token=' + TOKEN,
                page: true,
                limit: 15,
                cols: [[
                    { field: 'id', title: 'ID', width: 50, sort: true },
                    { field: 'username', title: '登录账号', width: 100 },
                    { field: 'nickname', title: '名称', width: 90 },
                    { field: 'role_name', title: '角色', width: 90 },
                    { field: 'business_type', title: '业务类型', width: 120, templet: '#bizTpl' },
                    { field: 'is_agent', title: '代理', width: 90, templet: '#agentTpl' },
                    { field: 'status', title: '状态', width: 65, templet: '#statusTpl' },
                    { field: 'phone', title: '电话', width: 110 },
                    { field: 'created_at', title: '创建时间', width: 145 },
                    { title: '操作', toolbar: '#toolDemo', width: 180, align: 'center', fixed: 'right' }
                ]],
                parseData: function(res) {
                    return { "code": res.code, "msg": "", "count": res.count, "data": res.data };
                }
            });

            $('#refreshBtn').on('click', function() { table.reload('listTable'); });
            $('#searchBtn').on('click', function() {
                table.reload('listTable', { where: { keyword: $('#keyword').val() } });
            });

            function collectFormData() {
                var gamePerms = [];
                $('input[name="game_perm"]:checked').each(function() { gamePerms.push(parseInt($(this).val())); });
                return {
                    username: $('#username').val(),
                    nickname: $('#nickname').val(),
                    password: $('#password').val(),
                    role_id: $('#role_id').val() ? parseInt($('#role_id').val()) : null,
                    status: $('#status').val(),
                    id_card: $('#id_card').val(),
                    business_type: $('input[name="business_type"]:checked').val(),
                    member_type: $('input[name="member_type"]:checked').val(),
                    commission_mode: $('input[name="commission_mode"]:checked').val(),
                    commission_value: $('#commission_value').val(),
                    alipay_account: $('#alipay_account').val(),
                    alipay_name: $('#alipay_name').val(),
                    wechat_account: $('#wechat_account').val(),
                    wechat_qrcode: $('#wechat_qrcode').val(),
                    grab_limit_dailian: $('#grab_limit_dailian').val(),
                    grab_limit_peiwan: $('#grab_limit_peiwan').val(),
                    grab_price_min: $('#grab_price_min').val(),
                    grab_price_max: $('#grab_price_max').val(),
                    live_url: $('#live_url').val(),
                    qq_wechat: $('#qq_wechat').val(),
                    phone: $('#phone').val(),
                    hire_date: $('#hire_date').val(),
                    mark: $('#mark').val(),
                    deposit: $('#deposit').val(),
                    no_sms: $('input[name="no_sms"]:checked').val() === '1',
                    all_games: $('input[name="all_games"]:checked').val() === '1',
                    game_permissions: gamePerms,
                    remark: $('#remark').val()
                };
            }

            function fillForm(d) {
                $('#username').val(d.username || '');
                $('#nickname').val(d.nickname || '');
                $('#password').val('');
                $('#status').val(d.status || 'normal');
                $('#id_card').val(d.id_card || '');
                $('input[name="business_type"][value="'+(d.business_type||'both')+'"]').prop('checked', true);
                $('input[name="member_type"][value="'+(d.member_type||'internal')+'"]').prop('checked', true);
                $('input[name="commission_mode"][value="'+(d.commission_mode||'fixed')+'"]').prop('checked', true);
                $('#commission_value').val(d.commission_value || 0);
                $('#alipay_account').val(d.alipay_account || '');
                $('#alipay_name').val(d.alipay_name || '');
                $('#wechat_account').val(d.wechat_account || '');
                $('#wechat_qrcode').val(d.wechat_qrcode || '');
                $('#grab_limit_dailian').val(d.grab_limit_dailian || 0);
                $('#grab_limit_peiwan').val(d.grab_limit_peiwan || 0);
                $('#grab_price_min').val(d.grab_price_min || 0);
                $('#grab_price_max').val(d.grab_price_max || 99999);
                $('#live_url').val(d.live_url || '');
                $('#qq_wechat').val(d.qq_wechat || '');
                $('#phone').val(d.phone || '');
                $('#hire_date').val(d.hire_date || '');
                $('#mark').val(d.mark || '');
                $('#deposit').val(d.deposit || 0);
                $('input[name="no_sms"][value="'+(d.no_sms?'1':'0')+'"]').prop('checked', true);
                $('input[name="all_games"][value="'+(d.all_games?'1':'0')+'"]').prop('checked', true);
                $('#remark').val(d.remark || '');
                if (d.all_games) { $('#gamePermSection').hide(); } else { $('#gamePermSection').show(); }
                var gp = d.game_permissions;
                if (gp) {
                    try {
                        var ids = typeof gp === 'string' ? JSON.parse(gp) : gp;
                        ids.forEach(function(gid) {
                            $('input[name="game_perm"][value="'+gid+'"]').prop('checked', true);
                        });
                    } catch(e) {}
                }
                loadRoles();
                setTimeout(function() {
                    $('#role_id').val(d.role_id);
                    form.render();
                }, 300);
            }

            $('#addNew').on('click', function() {
                $('#editId').val('');
                $('#userForm')[0].reset();
                $('input[name="business_type"][value="both"]').prop('checked', true);
                $('input[name="member_type"][value="internal"]').prop('checked', true);
                $('input[name="commission_mode"][value="fixed"]').prop('checked', true);
                $('input[name="no_sms"][value="0"]').prop('checked', true);
                $('input[name="all_games"][value="0"]').prop('checked', true);
                $('#gamePermSection').show();
                $('input[name="game_perm"]').prop('checked', false);
                form.render();
                layer.open({
                    type: 1, title: '新增用户', area: ['1100px', 'auto'],
                    content: $('#userModal'),
                    btn: ['确定', '取消'],
                    yes: function(index) {
                        var data = collectFormData();
                        $.ajax({
                            url: '/api/users?token=' + TOKEN, method: 'POST',
                            contentType: 'application/json', data: JSON.stringify(data),
                            success: function(res) {
                                if (res.code === 1) { layer.close(index); table.reload('listTable'); loadAgents(); layer.msg(res.msg, {icon:1}); }
                                else { layer.msg(res.msg, {icon:2}); }
                            }
                        });
                    }
                });
            });

            table.on('tool(listTable)', function(obj) {
                var data = obj.data;
                if (obj.event === 'edit') {
                    $('#editId').val(data.id);
                    fillForm(data);
                    layer.open({
                        type: 1, title: '修改用户', area: ['1100px', 'auto'],
                        content: $('#userModal'),
                        btn: ['确定', '取消'],
                        yes: function(index) {
                            var formData = collectFormData();
                            delete formData.username;
                            if (!formData.password) delete formData.password;
                            $.ajax({
                                url: '/api/users/' + data.id + '?token=' + TOKEN, method: 'PUT',
                                contentType: 'application/json', data: JSON.stringify(formData),
                                success: function(res) {
                                    if (res.code === 1) { layer.close(index); table.reload('listTable'); loadAgents(); layer.msg(res.msg, {icon:1}); }
                                    else { layer.msg(res.msg, {icon:2}); }
                                }
                            });
                        }
                    });
                } else if (obj.event === 'del') {
                    layer.confirm('确定删除该用户？', function(idx) {
                        $.ajax({
                            url: '/api/users/' + data.id + '?token=' + TOKEN, method: 'DELETE',
                            success: function(res) {
                                if (res.code === 1) { table.reload('listTable'); loadAgents(); layer.msg(res.msg, {icon:1}); }
                                else { layer.msg(res.msg, {icon:2}); }
                                layer.close(idx);
                            }
                        });
                    });
                } else if (obj.event === 'agent') {
                    $('#agentUid').val(data.id);
                    $('#agentUserName').text(data.nickname || data.username);
                    $('#is_agent').prop('checked', data.is_agent);
                    $('#agent_level').val(data.agent_level);
                    loadAgents();
                    setTimeout(function() {
                        $('#parent_id').val(data.parent_id);
                        form.render();
                    }, 300);
                    var currentStatus = data.is_agent ?
                        '<span class="agent-badge"><i class="fas fa-crown"></i> 代理L'+data.agent_level+'</span>' :
                        '<span style="color:#999;">普通用户</span>';
                    $('#agentCurrentStatus').html('当前状态: ' + currentStatus);
                    layer.open({
                        type: 1, title: '代理设置', area: ['450px', '400px'],
                        content: $('#agentModal'),
                        btn: ['确定', '取消'],
                        success: function() { form.render(); },
                        yes: function(index) {
                            $.ajax({
                                url: '/api/users/' + data.id + '/set_agent?token=' + TOKEN,
                                method: 'POST',
                                contentType: 'application/json',
                                data: JSON.stringify({
                                    is_agent: $('#is_agent').is(':checked'),
                                    agent_level: parseInt($('#agent_level').val()),
                                    parent_id: $('#parent_id').val() ? parseInt($('#parent_id').val()) : null
                                }),
                                success: function(res) {
                                    if (res.code === 1) { layer.close(index); table.reload('listTable'); layer.msg(res.msg, {icon:1}); }
                                    else { layer.msg(res.msg, {icon:2}); }
                                }
                            });
                        }
                    });
                }
            });
        });
    </script>
</body>
</html>
