<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>用户管理</title>
    <link href="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/css/layui.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f4f5f7; font-family: 'Microsoft YaHei', sans-serif; margin: 0; padding: 0; }
        .content { padding: 15px; }
        .panel { background: #fff; border-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .panel-body { padding: 15px; }
        .toolbar { margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
        .layui-table-cell { padding: 8px 6px !important; }
        .layui-btn-xs { height: 24px; line-height: 24px; padding: 0 8px; font-size: 12px; }
        .agent-badge { background: linear-gradient(135deg, #708eea, #a855f7); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .status-normal { color: #5FB878; font-weight: bold; }
        .status-hidden { color: #999; }
        .form-section { border: 1px solid #e8e8e8; border-radius: 6px; padding: 6px 10px; margin-bottom: 6px; }
        .form-section-title { font-size: 13px; font-weight: bold; color: #807dba; margin-bottom: 4px; padding-bottom: 3px; border-bottom: 1px dashed #e0d5f0; }
        .form-row { margin-bottom: 2px; display: flex; align-items: center; }
        .form-row .form-label { width: 100px; font-size: 12px; padding: 5px 6px; text-align: right; flex-shrink: 0; }
        .form-row .form-value { flex: 1; padding: 2px 6px; }
        .form-row .form-value input[type="text"],
        .form-row .form-value input[type="password"],
        .form-row .form-value input[type="number"],
        .form-row .form-value select,
        .form-row .form-value textarea { height: 28px; font-size: 12px; border: 1px solid #e6e6e6; border-radius: 2px; padding: 0 8px; width: 100%; box-sizing: border-box; }
        .form-row .form-value textarea { height: 36px; padding: 4px 8px; resize: none; }
        .radio-group { display: flex; gap: 4px; align-items: center; flex-wrap: nowrap; white-space: nowrap; }
        .radio-group label { cursor: pointer; display: inline-flex; align-items: center; gap: 2px; font-size: 12px; white-space: nowrap; }
        .game-checkbox-group { display: flex; flex-wrap: wrap; gap: 5px; padding: 5px; max-height: 100px; overflow-y: auto; border: 1px solid #e8e8e8; border-radius: 4px; }
        .game-checkbox-group label { cursor: pointer; display: inline-flex; align-items: center; gap: 3px; font-size: 12px; min-width: 100px; }
        .range-input { display: flex; align-items: center; gap: 5px; }
        .range-input input { width: 80px; height: 28px; font-size: 12px; border: 1px solid #e6e6e6; border-radius: 2px; padding: 0 8px; }
        .range-input span { color: #999; }
        .qrcode-upload { border: 2px dashed #d5c8f0; border-radius: 6px; width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .2s; position: relative; overflow: hidden; flex-direction: column; }
        .qrcode-upload:hover { border-color: #807dba; background: #f9f7fc; }
        .qrcode-upload img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .qrcode-upload .upload-icon { color: #c5b3e6; font-size: 22px; }
        .qrcode-upload .upload-hint { color: #c5b3e6; font-size: 10px; margin-top: 2px; }
        .qrcode-upload.drag-over { border-color: #807dba; background: #f0ecf7; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="content">
        <div class="panel">
            <div class="panel-body">
                <div class="toolbar">
                    <a href="javascript:;" class="layui-btn layui-btn-primary" id="refreshBtn"><i class="fas fa-refresh"></i> 刷新</a>
                    <a href="javascript:;" class="layui-btn layui-btn-normal" id="addNew"><i class="fas fa-plus"></i> 新增用户</a>
                    <div class="layui-inline" style="margin-left: 15px;">
                        <input type="text" id="keyword" placeholder="搜索用户名/昵称/手机号/身份证/QQ" class="layui-input" style="width:280px;height:32px;">
                    </div>
                    <button class="layui-btn layui-btn-sm" id="searchBtn" style="background:#807dba;"><i class="fas fa-search"></i></button>
                    <a href="javascript:;" class="layui-btn layui-btn-sm" id="allLogBtn" style="background:#5b6abf;margin-left:10px;"><i class="fas fa-clipboard-list"></i> 日志</a>
                </div>
                <table class="layui-table" id="listTable" lay-filter="listTable"></table>
            </div>
        </div>
    </div>

    <script type="text/html" id="toolDemo">
        <div class="layui-clear-space">
            <a class="layui-btn layui-btn-xs layui-btn-primary" lay-event="log"><i class="fas fa-clipboard-list"></i></a>
            <a class="layui-btn layui-btn-xs layui-btn-warning" lay-event="edit">修改</a>
            <a class="layui-btn layui-btn-xs layui-btn-normal" lay-event="agent">代理</a>
            <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="del">删除</a>
        </div>
    </script>

    {% raw %}
    <script type="text/html" id="agentTpl">
        {{#  if(d.is_agent){ }}
            <span class="agent-badge"><i class="fas fa-crown"></i> 代理L{{ d.agent_level }}</span>
        {{#  } else { }}
            <span style="color:#999;">普通用户</span>
        {{#  } }}
    </script>

    <script type="text/html" id="statusTpl">
        {{#  if(d.status === 'normal'){ }}
            <span class="status-normal">正常</span>
        {{#  } else { }}
            <span class="status-hidden">禁用</span>
        {{#  } }}
    </script>

    <script type="text/html" id="bizTpl">
        {{# var map = {'both':'代练+陪玩','dailian':'专做代练','peiwan':'专做陪玩'}; }}
        {{# var mtype = {'internal':'内部','partner':'合作'}; }}
        <span style="font-size:12px;">{{ map[d.business_type] || '代练+陪玩' }}</span>
        <span style="color:#999;font-size:11px;margin-left:4px;">({{ mtype[d.member_type] || '内部' }})</span>
    </script>
    {% endraw %}

    <div id="userModal" style="display:none; padding: 10px; min-height: 680px;">
        <input type="hidden" id="editId">
        <div style="display:flex;gap:12px;">
            <div style="flex:1;min-width:300px;">
                <div class="form-section">
                    <div class="form-section-title"><i class="fas fa-user"></i> 基础信息</div>
                    <div class="form-row"><div class="form-label">登录账号</div><div class="form-value"><input type="text" id="username" placeholder="推荐：手机号/QQ/姓名"></div></div>
                    <div class="form-row"><div class="form-label">账号名称</div><div class="form-value"><input type="text" id="nickname" placeholder="用户姓名或昵称"></div></div>
                    <div class="form-row"><div class="form-label">密码</div><div class="form-value"><input type="password" id="password" placeholder="新增必填，修改留空不改"></div></div>
                    <div class="form-row"><div class="form-label">身份证号</div><div class="form-value"><input type="text" id="id_card" placeholder="请输入身份证号"></div></div>
                    <div class="form-row"><div class="form-label">角色职位</div><div class="form-value"><select id="role_id"></select></div></div>
                    <div class="form-row"><div class="form-label">状态</div><div class="form-value"><select id="status"><option value="normal">正常</option><option value="hidden">禁用</option></select></div></div>
                </div>
                <div class="form-section">
                    <div class="form-section-title"><i class="fas fa-address-card"></i> 联系与备注</div>
                    <div class="form-row"><div class="form-label">QQ/微信</div><div class="form-value"><input type="text" id="qq_wechat" placeholder="联系QQ/微信"></div></div>
                    <div class="form-row"><div class="form-label">联系电话</div><div class="form-value"><input type="text" id="phone" placeholder="联系手机号"></div></div>
                    <div class="form-row"><div class="form-label">入职日期</div><div class="form-value"><input type="text" id="hire_date" placeholder="YYYY-MM-DD" readonly></div></div>
                    <div class="form-row"><div class="form-label">标记</div><div class="form-value"><input type="text" id="mark" placeholder="用户标记"></div></div>
                    <div class="form-row"><div class="form-label">已交保证金</div><div class="form-value"><input type="number" id="deposit" value="0" step="0.01" style="width:100px;"></div></div>
                    <div class="form-row"><div class="form-label">录单不发短信</div><div class="form-value"><div class="radio-group"><label><input type="radio" name="no_sms" value="0" checked> 允许发送</label><label><input type="radio" name="no_sms" value="1"> 不发短信</label></div></div></div>
                    <div class="form-row"><div class="form-label">备注说明</div><div class="form-value"><textarea id="remark" placeholder="备注说明"></textarea></div></div>
                </div>
            </div>
            <div style="flex:1;min-width:300px;">
                <div class="form-section">
                    <div class="form-section-title"><i class="fas fa-briefcase"></i> 业务配置</div>
                    <div class="form-row"><div class="form-label">业务类型</div><div class="form-value"><div class="radio-group"><label><input type="radio" name="business_type" value="both" checked> 代练+陪玩</label><label><input type="radio" name="business_type" value="dailian"> 专做代练</label><label><input type="radio" name="business_type" value="peiwan"> 专做陪玩</label></div></div></div>
                    <div class="form-row"><div class="form-label">成员类型</div><div class="form-value"><div class="radio-group"><label><input type="radio" name="member_type" value="internal" checked> 内部成员</label><label><input type="radio" name="member_type" value="partner"> 合作用户</label></div></div></div>
                    <div class="form-row"><div class="form-label">提成模式</div><div class="form-value"><div class="radio-group"><label><input type="radio" name="commission_mode" value="fixed" checked> 固定金额</label><label><input type="radio" name="commission_mode" value="percent"> 订单价%</label><label><input type="radio" name="commission_mode" value="profit_percent"> 利润%</label></div></div></div>
                    <div class="form-row"><div class="form-label">提成金额</div><div class="form-value"><input type="number" id="commission_value" value="0" step="0.01" style="width:100px;"></div></div>
                </div>
                <div class="form-section">
                    <div class="form-section-title"><i class="fas fa-money-bill-wave"></i> 结算信息</div>
                    <div class="form-row"><div class="form-label">支付宝账号</div><div class="form-value"><input type="text" id="alipay_account" placeholder="用来收款的支付账号"></div></div>
                    <div class="form-row"><div class="form-label">支付宝姓名</div><div class="form-value"><input type="text" id="alipay_name" placeholder="用来收款的支付姓名"></div></div>
                    <div class="form-row"><div class="form-label">支付宝收款码</div><div class="form-value"><div style="display:flex;align-items:center;gap:8px;"><div class="qrcode-upload" id="alipayQrcodeUpload" title="点击或拖拽上传支付宝收款码"><i class="fas fa-plus upload-icon" id="alipayQrcodeIcon"></i><span class="upload-hint" id="alipayQrcodeHint">拖拽上传</span><img id="alipayQrcodeImg" style="display:none;" onclick="layui.layer.photos({photos:{data:[{alt:'',src:this.src}]}})"></div><input type="file" id="alipayQrcodeFile" accept="image/*" style="display:none;"></div></div></div>
                    <div class="form-row"><div class="form-label">微信账号</div><div class="form-value"><input type="text" id="wechat_account" placeholder="用来收款的微信账号"></div></div>
                    <div class="form-row"><div class="form-label">微信收款码</div><div class="form-value"><div style="display:flex;align-items:center;gap:8px;"><div class="qrcode-upload" id="wechatQrcodeUpload" title="点击或拖拽上传微信收款码"><i class="fas fa-plus upload-icon" id="wechatQrcodeIcon"></i><span class="upload-hint" id="wechatQrcodeHint">拖拽上传</span><img id="wechatQrcodeImg" style="display:none;" onclick="layui.layer.photos({photos:{data:[{alt:'',src:this.src}]}})"></div><input type="file" id="wechatQrcodeFile" accept="image/*" style="display:none;"></div></div></div>
                </div>
            </div>
            <div style="flex:1;min-width:300px;">
                <div class="form-section">
                    <div class="form-section-title"><i class="fas fa-gamepad"></i> 抢单设置</div>
                    <div class="form-row"><div class="form-label">抢代练上限</div><div class="form-value"><input type="number" id="grab_limit_dailian" value="0" style="width:80px;"></div></div>
                    <div class="form-row"><div class="form-label">抢陪玩上限</div><div class="form-value"><input type="number" id="grab_limit_peiwan" value="0" style="width:80px;"></div></div>
                    <div class="form-row"><div class="form-label">抢单价范围</div><div class="form-value"><div class="range-input"><input type="number" id="grab_price_min" value="0" step="0.01"><span>—</span><input type="number" id="grab_price_max" value="99999" step="0.01"></div></div></div>
                    <div class="form-row"><div class="form-label">直播地址</div><div class="form-value"><input type="text" id="live_url" placeholder="打手直播URL"></div></div>
                </div>
                <div class="form-section">
                    <div class="form-section-title"><i class="fas fa-gamepad"></i> 游戏权限</div>
                    <div class="form-row"><div class="form-label">游戏权限</div><div class="form-value"><div style="display:flex;gap:6px;margin-bottom:4px;"><button type="button" class="layui-btn layui-btn-xs" id="gameSelectAll" style="background:#807dba;"><i class="fas fa-check-double"></i> 全选</button><button type="button" class="layui-btn layui-btn-xs layui-btn-primary" id="gameSelectNone"><i class="fas fa-times"></i> 取消全选</button></div><div class="game-checkbox-group" id="gameCheckboxGroup"></div></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="agentModal" style="display:none; padding: 20px;">
        <input type="hidden" id="agentUid">
        <div style="text-align:center; padding: 20px 0;">
            <div id="agentUserName" style="font-size:18px; font-weight:bold; color:#333;"></div>
            <div id="agentCurrentStatus" style="margin-top:8px;"></div>
        </div>
        <div class="form-row"><div class="form-label">开通代理</div><div class="form-value"><input type="checkbox" id="is_agent"></div></div>
        <div class="form-row"><div class="form-label">代理等级</div><div class="form-value"><select id="agent_level"><option value="0">普通代理</option><option value="1">一级代理</option><option value="2">二级代理</option><option value="3">三级代理</option><option value="4">四级代理</option><option value="5">五级代理</option></select></div></div>
        <div class="form-row"><div class="form-label">上级代理</div><div class="form-value"><select id="parent_id"><option value="">无</option></select></div></div>
    </div>

    <div id="userLogModal" style="display:none; padding: 15px;">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;">
            <input type="text" id="logDateFrom" placeholder="开始日期" class="layui-input" style="width:120px;height:30px;font-size:12px;" readonly>
            <span style="color:#999;">至</span>
            <input type="text" id="logDateTo" placeholder="结束日期" class="layui-input" style="width:120px;height:30px;font-size:12px;" readonly>
            <input type="text" id="logKeyword" placeholder="操作人/关键词" class="layui-input" style="width:160px;height:30px;font-size:12px;">
            <button class="layui-btn layui-btn-xs" id="logSearchBtn" style="background:#807dba;height:30px;line-height:30px;padding:0 12px;"><i class="fas fa-search"></i> 搜索</button>
            <button class="layui-btn layui-btn-xs layui-btn-primary" id="logResetBtn" style="height:30px;line-height:30px;padding:0 12px;">重置</button>
        </div>
        <div id="userLogList" style="max-height: 500px; overflow-y: auto;"></div>
        <div id="logPager" style="text-align:center;margin-top:8px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/layui.js"></script>
    <script>
        var TOKEN = new URLSearchParams(window.location.search).get('token') || sessionStorage.getItem('auth_token') || '';
        $.ajaxSetup({ beforeSend: function(xhr) { if (TOKEN) xhr.setRequestHeader('Authorization', 'Bearer ' + TOKEN); } });
        $(document).ajaxError(function(event, xhr) {
            if (xhr.status === 401) { sessionStorage.removeItem('auth_token'); window.top.location.href = '/login'; }
            else if (xhr.status === 403) { layui.layer.alert('权限不足', {icon:2}, function(){ window.top.location.href = '/login'; }); }
        });

        var rolesData = [];
        var gamesData = [];

        layui.use(['table', 'layer', 'laydate'], function() {
            var table = layui.table;
            var layer = layui.layer;
            var laydate = layui.laydate;

            laydate.render({ elem: '#hire_date', format: 'yyyy-MM-dd' });
            laydate.render({ elem: '#logDateFrom', format: 'yyyy-MM-dd' });
            laydate.render({ elem: '#logDateTo', format: 'yyyy-MM-dd' });

            function loadRoles() {
                $.get('/api/roles?token=' + TOKEN, function(res) {
                    rolesData = res.data || [];
                    var html = '<option value="">请选择角色</option>';
                    rolesData.forEach(function(r) { html += '<option value="'+r.id+'">'+r.name+'</option>'; });
                    $('#role_id').html(html);
                });
            }

            function loadGames(callback) {
                $.get('/api/games?token=' + TOKEN, function(res) {
                    gamesData = res.data || [];
                    var html = '';
                    gamesData.forEach(function(g) {
                        html += '<label><input type="checkbox" class="game-perm-cb" value="'+g.id+'"> '+g.name+'</label>';
                    });
                    $('#gameCheckboxGroup').html(html);
                    if (callback) callback();
                });
            }

            function setQrcodeImg(type, url) {
                var $img = $('#' + type + 'QrcodeImg');
                var $icon = $('#' + type + 'QrcodeIcon');
                var $hint = $('#' + type + 'QrcodeHint');
                if (url) {
                    $img.attr('src', url).show();
                    $icon.hide();
                    $hint.hide();
                } else {
                    $img.hide().attr('src', '');
                    $icon.show();
                    $hint.show();
                }
            }

            function initQrcodeUpload(type) {
                var $box = $('#' + type + 'QrcodeUpload');
                var $file = $('#' + type + 'QrcodeFile');
                $box.on('click', function(e) {
                    if (e.target.tagName !== 'IMG') $file.click();
                });
                $box.on('dragover', function(e) { e.preventDefault(); e.stopPropagation(); $(this).addClass('drag-over'); });
                $box.on('dragleave drop', function(e) { e.preventDefault(); e.stopPropagation(); $(this).removeClass('drag-over'); });
                $box.on('drop', function(e) { uploadQrcodeFile(type, e.originalEvent.dataTransfer.files[0]); });
                $file.on('change', function() { if (this.files[0]) uploadQrcodeFile(type, this.files[0]); this.value = ''; });
            }

            function uploadQrcodeFile(type, file) {
                if (!file || !file.type.startsWith('image/')) { layer.msg('请选择图片文件', {icon:0}); return; }
                var fd = new FormData();
                fd.append('file', file);
                $.ajax({
                    url: '/api/upload?token=' + TOKEN, method: 'POST',
                    data: fd, processData: false, contentType: false,
                    success: function(res) {
                        if (res.code === 1 && res.url) {
                            setQrcodeImg(type, res.url);
                        } else { layer.msg(res.msg || '上传失败', {icon:2}); }
                    }
                });
            }

            initQrcodeUpload('alipay');
            initQrcodeUpload('wechat');

            function loadAgents() {
                $.get('/api/users?limit=999&token=' + TOKEN, function(res) {
                    var html = '<option value="">无</option>';
                    (res.data || []).forEach(function(u) {
                        if (u.is_agent) html += '<option value="'+u.id+'">'+u.nickname+' (L'+u.agent_level+')</option>';
                    });
                    $('#parent_id').html(html);
                });
            }

            loadRoles();
            loadGames();
            loadAgents();

            $('#gameSelectAll').on('click', function() {
                $('.game-perm-cb').prop('checked', true);
            });
            $('#gameSelectNone').on('click', function() {
                $('.game-perm-cb').prop('checked', false);
            });

            table.render({
                elem: '#listTable',
                url: '/api/users?token=' + TOKEN,
                page: true,
                limit: 15,
                cols: [[
                    { field: 'id', title: 'ID', width: 50, sort: true },
                    { field: 'username', title: '登录账号', width: 100 },
                    { field: 'nickname', title: '名称', width: 90 },
                    { field: 'role_name', title: '角色', width: 90 },
                    { field: 'business_type', title: '业务类型', width: 120, templet: '#bizTpl' },
                    { field: 'is_agent', title: '代理', width: 90, templet: '#agentTpl' },
                    { field: 'status', title: '状态', width: 65, templet: '#statusTpl' },
                    { field: 'phone', title: '电话', width: 110 },
                    { field: 'created_at', title: '创建时间', width: 145 },
                    { title: '操作', toolbar: '#toolDemo', width: 230, align: 'center', fixed: 'right' }
                ]],
                parseData: function(res) {
                    return { "code": res.code, "msg": "", "count": res.count, "data": res.data };
                }
            });

            $('#refreshBtn').on('click', function() { table.reload('listTable'); });
            $('#searchBtn').on('click', function() {
                table.reload('listTable', { where: { keyword: $('#keyword').val() } });
            });

            function renderLogAction(action) {
                if (!action) return '';
                return action.replace(/: (.+?) → (.+?)(?=, [^:]+: |$)/g, function(m, old, nw) {
                    return ': <span style="color:#ff5722;text-decoration:line-through;">' + old + '</span> → <span style="color:#5FB878;font-weight:bold;">' + nw + '</span>';
                });
            }

            var logPage = 1;
            var logLimit = 50;

            function loadLogs(page) {
                logPage = page || 1;
                var params = 'limit=' + logLimit + '&page=' + logPage;
                var kw = $('#logKeyword').val();
                var df = $('#logDateFrom').val();
                var dt = $('#logDateTo').val();
                if (kw) params += '&keyword=' + encodeURIComponent(kw);
                if (df) params += '&date_from=' + encodeURIComponent(df);
                if (dt) params += '&date_to=' + encodeURIComponent(dt);
                $.get('/api/admin_logs?' + params + '&token=' + TOKEN, function(res) {
                    var html = '';
                    (res.data || []).forEach(function(l) {
                        html += '<div style="padding:8px 0;border-bottom:1px dashed #e2e2e2;font-size:13px;">';
                        html += '<span style="color:#999;margin-right:8px;">[' + (l.created_at || '') + ']</span>';
                        html += '<span style="color:#1e9fff;margin-right:8px;">[' + (l.username || '') + ']</span>';
                        if (l.role_name) html += '<span style="color:#9c27b0;margin-right:8px;">[' + l.role_name + ']</span>';
                        html += '<span>' + renderLogAction(l.action || '') + '</span>';
                        html += '</div>';
                    });
                    if (!html) html = '<div style="color:#999;text-align:center;padding:20px;">暂无日志</div>';
                    $('#userLogList').html(html);
                    var total = res.count || 0;
                    var totalPages = Math.ceil(total / logLimit) || 1;
                    var pagerHtml = '<span style="color:#999;font-size:12px;">共 ' + total + ' 条</span> ';
                    if (logPage > 1) pagerHtml += '<a href="javascript:;" class="layui-btn layui-btn-xs layui-btn-primary" onclick="window._loadLogs(' + (logPage-1) + ')">上一页</a> ';
                    pagerHtml += '<span style="font-size:12px;">' + logPage + '/' + totalPages + '</span> ';
                    if (logPage < totalPages) pagerHtml += '<a href="javascript:;" class="layui-btn layui-btn-xs layui-btn-primary" onclick="window._loadLogs(' + (logPage+1) + ')">下一页</a>';
                    $('#logPager').html(pagerHtml);
                });
            }
            window._loadLogs = loadLogs;

            $('#allLogBtn').on('click', function() {
                $('#logKeyword').val('');
                $('#logDateFrom').val('');
                $('#logDateTo').val('');
                loadLogs(1);
                layer.open({
                    type: 1, title: '操作日志', area: ['1100px', '700px'],
                    content: $('#userLogModal')
                });
            });

            $(document).on('click', '#logSearchBtn', function() { loadLogs(1); });
            $(document).on('click', '#logResetBtn', function() {
                $('#logKeyword').val('');
                $('#logDateFrom').val('');
                $('#logDateTo').val('');
                loadLogs(1);
            });

            function collectFormData() {
                var gamePerms = [];
                $('.game-perm-cb:checked').each(function() { gamePerms.push(parseInt($(this).val())); });
                return {
                    username: $('#username').val(),
                    nickname: $('#nickname').val(),
                    password: $('#password').val(),
                    role_id: $('#role_id').val() ? parseInt($('#role_id').val()) : null,
                    status: $('#status').val(),
                    id_card: $('#id_card').val(),
                    business_type: $('input[name="business_type"]:checked').val(),
                    member_type: $('input[name="member_type"]:checked').val(),
                    commission_mode: $('input[name="commission_mode"]:checked').val(),
                    commission_value: $('#commission_value').val(),
                    alipay_account: $('#alipay_account').val(),
                    alipay_name: $('#alipay_name').val(),
                    alipay_qrcode: $('#alipayQrcodeImg').attr('src') || '',
                    wechat_account: $('#wechat_account').val(),
                    wechat_qrcode: $('#wechatQrcodeImg').attr('src') || '',
                    grab_limit_dailian: $('#grab_limit_dailian').val(),
                    grab_limit_peiwan: $('#grab_limit_peiwan').val(),
                    grab_price_min: $('#grab_price_min').val(),
                    grab_price_max: $('#grab_price_max').val(),
                    live_url: $('#live_url').val(),
                    qq_wechat: $('#qq_wechat').val(),
                    phone: $('#phone').val(),
                    hire_date: $('#hire_date').val(),
                    mark: $('#mark').val(),
                    deposit: $('#deposit').val(),
                    no_sms: $('input[name="no_sms"]:checked').val() === '1',
                    all_games: gamesData.length > 0 && gamePerms.length === gamesData.length,
                    game_permissions: gamePerms,
                    remark: $('#remark').val()
                };
            }

            function resetForm() {
                $('#editId').val('');
                $('#username').val('');
                $('#nickname').val('');
                $('#password').val('');
                $('#id_card').val('');
                $('#role_id').val('');
                $('#status').val('normal');
                $('input[name="business_type"][value="both"]').prop('checked', true);
                $('input[name="member_type"][value="internal"]').prop('checked', true);
                $('input[name="commission_mode"][value="fixed"]').prop('checked', true);
                $('#commission_value').val(0);
                $('#alipay_account').val('');
                $('#alipay_name').val('');
                $('#wechat_account').val('');
                setQrcodeImg('alipay', '');
                setQrcodeImg('wechat', '');
                $('#grab_limit_dailian').val(0);
                $('#grab_limit_peiwan').val(0);
                $('#grab_price_min').val(0);
                $('#grab_price_max').val(99999);
                $('#live_url').val('');
                $('#qq_wechat').val('');
                $('#phone').val('');
                $('#hire_date').val('');
                $('#mark').val('');
                $('#deposit').val(0);
                $('input[name="no_sms"][value="0"]').prop('checked', true);
                $('#remark').val('');
                $('.game-perm-cb').prop('checked', false);
            }

            function fillForm(d) {
                $('#username').val(d.username || '');
                $('#nickname').val(d.nickname || '');
                $('#password').val('');
                $('#status').val(d.status || 'normal');
                $('#id_card').val(d.id_card || '');
                $('input[name="business_type"][value="'+(d.business_type||'both')+'"]').prop('checked', true);
                $('input[name="member_type"][value="'+(d.member_type||'internal')+'"]').prop('checked', true);
                $('input[name="commission_mode"][value="'+(d.commission_mode||'fixed')+'"]').prop('checked', true);
                $('#commission_value').val(d.commission_value || 0);
                $('#alipay_account').val(d.alipay_account || '');
                $('#alipay_name').val(d.alipay_name || '');
                $('#wechat_account').val(d.wechat_account || '');
                setQrcodeImg('alipay', d.alipay_qrcode || '');
                setQrcodeImg('wechat', d.wechat_qrcode || '');
                $('#grab_limit_dailian').val(d.grab_limit_dailian || 0);
                $('#grab_limit_peiwan').val(d.grab_limit_peiwan || 0);
                $('#grab_price_min').val(d.grab_price_min || 0);
                $('#grab_price_max').val(d.grab_price_max || 99999);
                $('#live_url').val(d.live_url || '');
                $('#qq_wechat').val(d.qq_wechat || '');
                $('#phone').val(d.phone || '');
                $('#hire_date').val(d.hire_date || '');
                $('#mark').val(d.mark || '');
                $('#deposit').val(d.deposit || 0);
                $('input[name="no_sms"][value="'+(d.no_sms?'1':'0')+'"]').prop('checked', true);
                $('#remark').val(d.remark || '');
                var gp = d.game_permissions;
                if (d.all_games) {
                    $('.game-perm-cb').prop('checked', true);
                } else if (gp) {
                    try {
                        var ids = typeof gp === 'string' ? JSON.parse(gp) : gp;
                        ids.forEach(function(gid) {
                            $('.game-perm-cb[value="'+gid+'"]').prop('checked', true);
                        });
                    } catch(e) {}
                }
                loadRoles();
                setTimeout(function() {
                    $('#role_id').val(d.role_id);
                }, 300);
            }

            $('#addNew').on('click', function() {
                resetForm();
                loadGames(function() {
                    layer.open({
                        type: 1, title: '新增用户', area: ['1400px', 'auto'],
                        content: $('#userModal'),
                        btn: ['确定', '取消'],
                        yes: function(index) {
                            var data = collectFormData();
                            if (!data.role_id) { layer.msg('请选择角色职位', {icon:0}); return; }
                            $.ajax({
                                url: '/api/users?token=' + TOKEN, method: 'POST',
                                contentType: 'application/json', data: JSON.stringify(data),
                                success: function(res) {
                                    if (res.code === 1) { layer.close(index); table.reload('listTable'); loadAgents(); layer.msg(res.msg, {icon:1}); }
                                    else { layer.msg(res.msg || '新增失败', {icon:2}); }
                                },
                                error: function() { layer.msg('请求失败', {icon:2}); }
                            });
                        }
                    });
                });
            });

            table.on('tool(listTable)', function(obj) {
                var data = obj.data;
                if (obj.event === 'edit') {
                    $('#editId').val(data.id);
                    loadGames(function() {
                        fillForm(data);
                        layer.open({
                            type: 1, title: '修改用户', area: ['1400px', 'auto'],
                            content: $('#userModal'),
                            btn: ['确定', '取消'],
                            yes: function(index) {
                                var formData = collectFormData();
                                delete formData.username;
                                if (!formData.password) delete formData.password;
                                $.ajax({
                                    url: '/api/users/' + data.id + '?token=' + TOKEN, method: 'PUT',
                                    contentType: 'application/json', data: JSON.stringify(formData),
                                    success: function(res) {
                                        if (res.code === 1) { layer.close(index); table.reload('listTable'); loadAgents(); layer.msg(res.msg, {icon:1}); }
                                        else { layer.msg(res.msg, {icon:2}); }
                                    },
                                    error: function(xhr) { layer.msg('请求失败: ' + (xhr.status || '未知错误'), {icon:2}); }
                                });
                            }
                        });
                    });
                } else if (obj.event === 'log') {
                    $('#logKeyword').val('');
                    $('#logDateFrom').val('');
                    $('#logDateTo').val('');
                    var origLoad = loadLogs;
                    loadLogs = function(page) {
                        logPage = page || 1;
                        var params = 'limit=' + logLimit + '&page=' + logPage + '&user_id=' + data.id;
                        $.get('/api/admin_logs?' + params + '&token=' + TOKEN, function(res) {
                            var html = '';
                            (res.data || []).forEach(function(l) {
                                html += '<div style="padding:8px 0;border-bottom:1px dashed #e2e2e2;font-size:13px;">';
                                html += '<span style="color:#999;margin-right:8px;">[' + (l.created_at || '') + ']</span>';
                                html += '<span style="color:#1e9fff;margin-right:8px;">[' + (l.username || '') + ']</span>';
                                if (l.role_name) html += '<span style="color:#9c27b0;margin-right:8px;">[' + l.role_name + ']</span>';
                                html += '<span>' + renderLogAction(l.action || '') + '</span>';
                                html += '</div>';
                            });
                            if (!html) html = '<div style="color:#999;text-align:center;padding:20px;">暂无日志</div>';
                            $('#userLogList').html(html);
                            var total = res.count || 0;
                            var totalPages = Math.ceil(total / logLimit) || 1;
                            var pagerHtml = '<span style="color:#999;font-size:12px;">共 ' + total + ' 条</span> ';
                            if (logPage > 1) pagerHtml += '<a href="javascript:;" class="layui-btn layui-btn-xs layui-btn-primary" onclick="window._loadLogs(' + (logPage-1) + ')">上一页</a> ';
                            pagerHtml += '<span style="font-size:12px;">' + logPage + '/' + totalPages + '</span> ';
                            if (logPage < totalPages) pagerHtml += '<a href="javascript:;" class="layui-btn layui-btn-xs layui-btn-primary" onclick="window._loadLogs(' + (logPage+1) + ')">下一页</a>';
                            $('#logPager').html(pagerHtml);
                        });
                    };
                    loadLogs(1);
                    layer.open({
                        type: 1, title: (data.nickname || data.username) + '的操作日志', area: ['1100px', '700px'],
                        content: $('#userLogModal'),
                        cancel: function() { loadLogs = origLoad; }
                    });
                } else if (obj.event === 'del') {
                    layer.confirm('确定删除该用户？', function(idx) {
                        $.ajax({
                            url: '/api/users/' + data.id + '?token=' + TOKEN, method: 'DELETE',
                            success: function(res) {
                                if (res.code === 1) { table.reload('listTable'); loadAgents(); layer.msg(res.msg, {icon:1}); }
                                else { layer.msg(res.msg, {icon:2}); }
                                layer.close(idx);
                            },
                            error: function(xhr) { layer.msg('删除失败: ' + (xhr.status || '未知错误'), {icon:2}); layer.close(idx); }
                        });
                    });
                } else if (obj.event === 'agent') {
                    $('#agentUid').val(data.id);
                    $('#agentUserName').text(data.nickname || data.username);
                    $('#is_agent').prop('checked', data.is_agent);
                    $('#agent_level').val(data.agent_level);
                    loadAgents();
                    setTimeout(function() {
                        $('#parent_id').val(data.parent_id);
                    }, 300);
                    var currentStatus = data.is_agent ?
                        '<span class="agent-badge"><i class="fas fa-crown"></i> 代理L'+data.agent_level+'</span>' :
                        '<span style="color:#999;">普通用户</span>';
                    $('#agentCurrentStatus').html('当前状态: ' + currentStatus);
                    layer.open({
                        type: 1, title: '代理设置', area: ['450px', '400px'],
                        content: $('#agentModal'),
                        btn: ['确定', '取消'],
                        yes: function(index) {
                            $.ajax({
                                url: '/api/users/' + data.id + '/set_agent?token=' + TOKEN,
                                method: 'POST',
                                contentType: 'application/json',
                                data: JSON.stringify({
                                    is_agent: $('#is_agent').is(':checked'),
                                    agent_level: parseInt($('#agent_level').val()),
                                    parent_id: $('#parent_id').val() ? parseInt($('#parent_id').val()) : null
                                }),
                                success: function(res) {
                                    if (res.code === 1) { layer.close(index); table.reload('listTable'); layer.msg(res.msg, {icon:1}); }
                                    else { layer.msg(res.msg, {icon:2}); }
                                },
                                error: function(xhr) { layer.msg('设置失败: ' + (xhr.status || '未知错误'), {icon:2}); }
                            });
                        }
                    });
                }
            });
        });
    </script>
</body>
</html>
